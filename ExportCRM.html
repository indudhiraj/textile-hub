// ── Live analog clock in the header credit bar (guarded — header re-renders on every state change) ──
function tickAnalogClock(){
  const hourEl = document.getElementById('clockHour');
  const minEl = document.getElementById('clockMinute');
  const secEl = document.getElementById('clockSecond');
  if(!hourEl || !minEl || !secEl) return;
  const now = new Date();
  const h = now.getHours() % 12;
  const m = now.getMinutes();
  const s = now.getSeconds();
  hourEl.setAttribute('transform', `rotate(${(h*30)+(m*0.5)} 50 50)`);
  minEl.setAttribute('transform', `rotate(${(m*6)+(s*0.1)} 50 50)`);
  secEl.setAttribute('transform', `rotate(${s*6} 50 50)`);
}
setInterval(tickAnalogClock, 1000);

/* ---------- storage: works inside Claude.ai (window.storage) and standalone (localStorage) ---------- */
const storage = {
  async get(key) {
    if (window.storage && typeof window.storage.get === "function") {
      try { const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; }
      catch (e) { return null; }
    }
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch (e) { return null; }
  },
  async set(key, value) {
    if (window.storage && typeof window.storage.set === "function") {
      try { await window.storage.set(key, JSON.stringify(value), false); return; }
      catch (e) { /* fall through to localStorage as backup */ }
    }
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error(e); }
  }
};

const FB_ROOT = "export_crm";

// Live connection indicator — Firebase's special ".info/connected" path pushes
// true/false the moment socket status changes, so the dot in the header stays accurate.
if (fbReady) {
  fbDb.ref(".info/connected").on("value", (snap) => {
    state.cloudStatus = snap.val() === true ? "online" : "offline";
    render();
  });
} else {
  state.cloudStatus = "offline";
}

// Fire-and-forget write to cloud; never blocks the UI, errors are just logged.
async function fbSave(key, value, ts) {
  if (!fbReady || !fbDb) return;
  try {
    await fbDb.ref(`${FB_ROOT}/${key}`).set({ data: value, updatedAt: ts || Date.now() });
  } catch (e) {
    console.error("Firebase save error [" + key + "]:", e);
  }
}

// Runs in the background after local (fast) load. Only overwrites local/state
// if the cloud copy is strictly newer, so a stale cloud read never clobbers
// fresh local edits (same pattern used across the other factory tools).
async function fbAutoLoad(key, arrName) {
  if (!fbReady || !fbDb) return;
  try {
    const snap = await fbDb.ref(`${FB_ROOT}/${key}`).once("value");
    if (!snap.exists()) return;
    const cloud = snap.val();
    if (!cloud || !Array.isArray(cloud.data)) return;
    const localTs = Number((await storage.get(key + "-ts")) || 0);
    if (cloud.updatedAt && cloud.updatedAt > localTs) {
      state[arrName] = cloud.data;
      await storage.set(key, state[arrName]);
      await storage.set(key + "-ts", cloud.updatedAt);
      render();
    }
  } catch (e) {
    console.error("Firebase load error [" + key + "]:", e);
  }
}

function websiteLink(url, companyName) {
  const raw = String(url ?? "").trim();
  const looksLikeDomain = /^(https?:\/\/)?([\w-]+\.)+[a-z]{2,}([\/?#].*)?$/i.test(raw) && !/\s/.test(raw);
  if (raw && looksLikeDomain) {
    const href = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
    return `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer" class="site-link" onclick="event.stopPropagation()">🔗 ${esc(raw)}</a>`;
  }
  // Website missing or not a valid-looking domain — fall back to a Google search so it's still clickable
  const q = encodeURIComponent(companyName || raw || "");
  if (!q) return "";
  return `<a href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener noreferrer" class="site-link" onclick="event.stopPropagation()">🔎 Google par dhundhein${raw ? ` (${esc(raw)} — link valid nahi laga)` : ""}</a>`;
}

/* ---------- AI helpers (Gemini — works standalone with your own free API key) ---------- */
async function callClaude(prompt, maxTokens = 900) {
  const apiKey = localStorage.getItem("geminiApiKey");
  if (!apiKey) throw new Error("NO_KEY");
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: maxTokens } })
  });
  const data = await res.json();
  if (data?.error) throw new Error(data.error.message || "Gemini API error");
  return data.candidates?.[0]?.content?.parts?.[0]?.text || "Response nahi mil paaya.";
}
async function callClaudeWithSearch(prompt, maxTokens = 1200) {
  const apiKey = localStorage.getItem("geminiApiKey");
  if (!apiKey) throw new Error("NO_KEY");
  const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: prompt }] }], tools: [{ google_search: {} }], generationConfig: { maxOutputTokens: maxTokens } })
  });
  const data = await res.json();
  if (data?.error) throw new Error(data.error.message || "Gemini API error");
  const parts = data.candidates?.[0]?.content?.parts || [];
  return parts.map(p => p.text || "").join("\n");
}

async function loadAll() {
  state.buyers = (await storage.get("buyers-list")) || [];
  state.contacts = (await storage.get("contacts-list")) || [];
  state.products = (await storage.get("products-list")) || [];
  state.tasks = (await storage.get("tasks-list")) || [];
  state.pin = await storage.get("app-pin");
  state.unlocked = !state.pin;
  state.loaded = true;
  render();

  // Cloud check happens after the instant local render — if Firebase has a
  // newer copy (e.g. edited on another device), it replaces local silently.
  fbAutoLoad("buyers-list", "buyers");
  fbAutoLoad("contacts-list", "contacts");
  fbAutoLoad("products-list", "products");
  fbAutoLoad("tasks-list", "tasks");
}
async function persist(key, arrName) {
  const ts = Date.now();
  await storage.set(key, state[arrName]);
  await storage.set(key + "-ts", ts);
  fbSave(key, state[arrName], ts); // don't await — keep UI snappy
}

function getPresentationMeta() {
  const raw = localStorage.getItem("companyPresentationMeta");
  return raw ? JSON.parse(raw) : null; // {name, size, type, dataUrl}
}
function fileToDataUrl(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}
function dataUrlToFile(dataUrl, filename, mime) {
  const arr = dataUrl.split(",");
  const bstr = atob(arr[1]);
  let n = bstr.length;
  const u8arr = new Uint8Array(n);
  while (n--) u8arr[n] = bstr.charCodeAt(n);
  return new File([u8arr], filename, { type: mime });
}

const CLOUD_KEYS = [["buyers-list","buyers"],["contacts-list","contacts"],["products-list","products"],["tasks-list","tasks"]];

// Manual "Save" — force-pushes current local data to Firebase right now,
// regardless of auto-sync, and reports success/failure back to the user.
async function cloudPushAll() {
  if (!fbReady) { state.cloudSaveStatus = "Firebase connect nahi hai — internet check karein."; render(); return; }
  state.cloudSaveStatus = "Cloud par save ho raha hai..."; render();
  try {
    const ts = Date.now();
    for (const [key, arrName] of CLOUD_KEYS) {
      await storage.set(key + "-ts", ts);
      await fbDb.ref(`${FB_ROOT}/${key}`).set({ data: state[arrName], updatedAt: ts });
    }
    state.cloudSaveStatus = "Cloud par save ho gaya ✓";
  } catch (e) {
    console.error("Cloud save error:", e);
    state.cloudSaveStatus = "Save mein error aayi — Firebase rules ya connection check karein.";
  }
  render();
  setTimeout(() => { state.cloudSaveStatus = ""; render(); }, 4000);
}

// Manual "Upload" (pull) — fetches latest cloud copy and shows a confirm step
// before overwriting local data, same safety pattern as JSON restore.
async function cloudPullAll() {
  if (!fbReady) { state.cloudUploadStatus = "Firebase connect nahi hai — internet check karein."; render(); return; }
  state.cloudUploadStatus = "Cloud se data laaya ja raha hai..."; render();
  try {
    const result = {};
    for (const [key, arrName] of CLOUD_KEYS) {
      const snap = await fbDb.ref(`${FB_ROOT}/${key}`).once("value");
      result[arrName] = snap.exists() && Array.isArray(snap.val().data) ? snap.val().data : [];
    }
    state.cloudUploadPending = result;
    state.cloudUploadStatus = "";
  } catch (e) {
    console.error("Cloud pull error:", e);
    state.cloudUploadStatus = "Load mein error aayi — Firebase rules ya connection check karein.";
  }
  render();
}
async function confirmCloudPull() {
  const d = state.cloudUploadPending;
  if (!d) return;
  const ts = Date.now();
  for (const [key, arrName] of CLOUD_KEYS) {
    state[arrName] = d[arrName] || [];
    await storage.set(key, state[arrName]);
    await storage.set(key + "-ts", ts);
  }
  state.cloudUploadPending = null;
  state.cloudUploadStatus = "Cloud se data upload ho gaya ✓";
  render();
  setTimeout(() => { state.cloudUploadStatus = ""; render(); }, 4000);
}

function parseEmailResult(text) {
  const lines = text.split("\n");
  let subject = ""; let bodyStart = 0;
  for (let i=0;i<lines.length;i++){
    const m = lines[i].match(/^\s*Subject:\s*(.*)$/i);
    if (m) { subject = m[1].trim(); bodyStart = i+1; break; }
  }
  const body = lines.slice(bodyStart).join("\n").trim();
  return { subject: subject || "Regarding our home furnishing products", body: body || text };
}

            <div class="muted">Price: ${esc(p.price)} ${esc(p.currency||"")} (${esc(p.incoterms||"")}) · MOQ: ${esc(p.moq)}</div>

}

      ${TRADE_FAIRS.map((f,i)=>`
        <div class="card">
          <div class="row">
            <div><b style="font-size:13px;">${esc(f.name)}</b><div class="muted">${esc(f.location)} · ${esc(f.dates)}</div><div class="ink" style="margin-top:4px;">${esc(f.focus)}</div></div>

function tasksTab() {
  const sorted = [...state.tasks].sort((a,b)=>a.dueDate.localeCompare(b.dueDate));
  return `

      <h2 class="section-title">Task & Reminders</h2>
      <button class="btn" data-action="add-task">+ Add</button>
    </div>
    ${sorted.length===0?'<p class="muted">Koi task nahi hai.</p>':""}
    ${sorted.map(t=>`
      <div class="card">
        <div class="row">
          <div>
            <div style="${t.done?'text-decoration:line-through;color:var(--muted);':''}">${esc(t.type)} — ${buyerName(t.buyerId)}</div>

  let out = "";
  if (state.editBuyer) {

    const isEdit = state.buyers.some(x=>x.id===b.id);
    out += `<div class="modal-bg" data-action="close-modal" data-which="buyer">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>${isEdit?"Edit Buyer":"Add Buyer"}</h3><button class="close-x" data-action="close-modal" data-which="buyer">✕</button></div>
        <div class="modal-body">
          <div class="grid2">
            <div><label>Buyer Name</label><input id="f_name" value="${esc(b.name)}" /></div>
            <div><label>Company</label><input id="f_company" value="${esc(b.company)}" /></div>
            <div><label>Country</label><input id="f_country" list="countryOptions" value="${esc(b.country)}" /></div>
            <div><label>Website</label><input id="f_website" value="${esc(b.website)}" /></div>
            <div><label>Email</label><input id="f_email" value="${esc(b.email)}" /></div>
            <div><label>Phone</label><input id="f_phone" value="${esc(b.phone)}" /></div>
            <div><label>LinkedIn</label><input id="f_linkedin" value="${esc(b.linkedin)}" /></div>
            <div><label>Product Category</label><input id="f_category" value="${esc(b.category)}" /></div>
            <div><label>MOQ</label><input id="f_moq" value="${esc(b.moq)}" /></div>
            <div><label>Annual Import Data</label><input id="f_annualImport" value="${esc(b.annualImport)}" /></div>
            <div><label>Priority</label>
              <select id="f_priority"><option ${b.priority==='A'?'selected':''}>A</option><option ${b.priority==='B'?'selected':''}>B</option><option ${b.priority==='C'?'selected':''}>C</option></select>
            </div>
          </div>
          <button class="btn" style="width:100%;" data-action="save-buyer">${state.buyerDupWarning ? "Confirm & Add Anyway" : "Save"}</button>
          ${state.buyerDupWarning ? `<p class="error-msg" style="margin-top:8px;">${esc(state.buyerDupWarning)}</p>` : ""}
        </div>
      </div></div>`;
  }
  if (state.editContact) {
    const c = state.editContact;
    out += `<div class="modal-bg" data-action="close-modal" data-which="contact">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>${state.contacts.some(x=>x.id===c.id)?"Edit Contact":"Add Contact"}</h3><button class="close-x" data-action="close-modal" data-which="contact">✕</button></div>
        <div class="modal-body">
          <label>Buyer</label>
          <select id="c_buyerId"><option value="">-- Select --</option>${state.buyers.map(b=>`<option value="${b.id}" ${c.buyerId===b.id?"selected":""}>${esc(b.name)} (${esc(b.company)})</option>`).join("")}</select>
          <div class="grid2">
            <div><label>Email Bheja Gaya</label><input type="date" id="c_emailDate" value="${c.emailDate}" /></div>
            <div><label>Reply Aaya?</label><select id="c_replyReceived"><option ${c.replyReceived==='No'?'selected':''}>No</option><option ${c.replyReceived==='Yes'?'selected':''}>Yes</option></select></div>
            <div><label>Next Follow-up</label><input type="date" id="c_nextFollowup" value="${c.nextFollowup}" /></div>
            <div><label>Sample Bheja?</label><select id="c_sampleSent"><option ${c.sampleSent==='No'?'selected':''}>No</option><option ${c.sampleSent==='Yes'?'selected':''}>Yes</option></select></div>
            <div><label>Quotation Bheji?</label><select id="c_quotationSent"><option ${c.quotationSent==='No'?'selected':''}>No</option><option ${c.quotationSent==='Yes'?'selected':''}>Yes</option></select></div>
            <div><label>Order Status</label><select id="c_orderStatus">${["None","Negotiating","Order Received","Lost"].map(o=>`<option ${c.orderStatus===o?'selected':''}>${o}</option>`).join("")}</select></div>
          </div>
          <label>Reply Notes</label><textarea id="c_replyNotes">${esc(c.replyNotes)}</textarea>
          <label>Meeting Notes</label><textarea id="c_meetingNotes">${esc(c.meetingNotes)}</textarea>
          <button class="btn" style="width:100%;" ${!c.buyerId?"disabled":""} data-action="save-contact">Save</button>
        </div>
      </div></div>`;
  }
  if (state.editProduct) {
    const p = state.editProduct;
    out += `<div class="modal-bg" data-action="close-modal" data-which="product">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>${state.products.some(x=>x.id===p.id)?"Edit Product":"Add Product"}</h3><button class="close-x" data-action="close-modal" data-which="product">✕</button></div>
        <div class="modal-body">
          <div class="grid2">
            <div><label>Product Name</label><input id="p_name" value="${esc(p.name)}" /></div>
            <div><label>Price</label><input id="p_price" value="${esc(p.price)}" /></div>
            <div><label>Currency</label>
              <select id="p_currency">${["USD","EUR","GBP","INR"].map(c=>`<option ${p.currency===c?"selected":""}>${c}</option>`).join("")}</select>
            </div>
            <div><label>Incoterms</label>
              <select id="p_incoterms">${["FOB","CIF","EXW","DDP","CPT","FCA"].map(t=>`<option ${p.incoterms===t?"selected":""}>${t}</option>`).join("")}</select>
            </div>
            <div><label>MOQ</label><input id="p_moq" value="${esc(p.moq)}" /></div>
            <div><label>Catalog Link</label><input id="p_catalog" value="${esc(p.catalog)}" /></div>
            <div><label>Certificates</label><input id="p_certificates" value="${esc(p.certificates)}" /></div>
            <div><label>Photo Description</label><input id="p_photoDesc" value="${esc(p.photoDesc)}" /></div>
          </div>
          <label>Specifications</label><textarea id="p_specs">${esc(p.specs)}</textarea>
          <button class="btn" style="width:100%;" data-action="save-product">Save</button>
        </div>
      </div></div>`;
  }
  if (state.editTask) {
    const t = state.editTask;
    out += `<div class="modal-bg" data-action="close-modal" data-which="task">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>${state.tasks.some(x=>x.id===t.id)?"Edit Task":"Add Task"}</h3><button class="close-x" data-action="close-modal" data-which="task">✕</button></div>
        <div class="modal-body">
          <label>Type</label><select id="t_type">${["Follow-up","Sample Dispatch","Shipment"].map(o=>`<option ${t.type===o?'selected':''}>${o}</option>`).join("")}</select>
          <label>Buyer</label><select id="t_buyerId"><option value="">-- Select --</option>${state.buyers.map(b=>`<option value="${b.id}" ${t.buyerId===b.id?"selected":""}>${esc(b.name)} (${esc(b.company)})</option>`).join("")}</select>
          <label>Due Date</label><input type="date" id="t_dueDate" value="${t.dueDate}" />
          <label>Note</label><textarea id="t_note">${esc(t.note)}</textarea>
          <button class="btn" style="width:100%;" data-action="save-task">Save</button>
        </div>
      </div></div>`;
  }
  if (state.quickFindOpen) {
    const q = state.quickFindQuery.trim().toLowerCase();
    let results = [];
    if (q) {
      state.buyers.forEach(b => { if ((b.name+" "+b.company+" "+b.email+" "+b.country).toLowerCase().includes(q)) results.push({ type:"Buyer", label:`${b.name} — ${b.company}`, tab:"buyers" }); });
      state.products.forEach(p => { if (p.name.toLowerCase().includes(q)) results.push({ type:"Product", label:p.name, tab:"products" }); });
      state.tasks.forEach(t => { if ((t.type+" "+t.note).toLowerCase().includes(q)) results.push({ type:"Task", label:`${t.type} — ${buyerName(t.buyerId)}`, tab:"tasks" }); });
      state.contacts.forEach(c => { if ((c.meetingNotes+" "+c.replyNotes).toLowerCase().includes(q)) results.push({ type:"Contact", label:buyerName(c.buyerId), tab:"crm" }); });
    }
    out += `<div class="modal-bg" data-action="close-quickfind">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>🔎 Quick Find</h3><button class="close-x" data-action="close-quickfind">✕</button></div>
        <div class="modal-body">
          <input id="quickFindInput" value="${esc(state.quickFindQuery)}" placeholder="Naam, company, product, task se search karein..." autofocus />
          ${q && results.length===0 ? '<p class="muted">Koi match nahi mila.</p>' : ""}
          ${results.slice(0,20).map(r=>`
            <div class="card" data-action="quickfind-goto" data-tab="${r.tab}" style="cursor:pointer;">
              <span class="tag">${r.type}</span> <span class="ink">${esc(r.label)}</span>
            </div>`).join("")}
        </div>
      </div></div>`;
  }

  if (state.settingsOpen) {
    out += `<div class="modal-bg" data-action="close-settings">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>⚙️ Settings</h3><button class="close-x" data-action="close-settings">✕</button></div>
        <div class="modal-body">
          <h3 class="section-title" style="color:var(--brass);">🤖 AI Settings (Gemini)</h3>
          <div data-action="toggle-ai-settings" style="display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;background:var(--panel-alt, rgba(0,0,0,.04));cursor:pointer;margin-bottom:8px;">
            <span>${aiStatusBadge().dot}</span>
            <span style="font-size:13px;font-weight:600;">${esc(aiStatusBadge().label)}</span>
            <span style="margin-left:auto;font-size:12px;color:var(--muted);">⚙️</span>
          </div>
          ${state.aiSettingsOpen ? `
            <label>Gemini API Key</label>
            <input id="geminiKeyInput" type="password" value="${esc(localStorage.getItem("geminiApiKey")||"")}" placeholder="AIza..." />
            <p class="muted" style="margin-top:6px;">Key <a href="https://aistudio.google.com/apikey" target="_blank" rel="noopener">aistudio.google.com/apikey</a> se Google account se 2 minute mein free banao — credit card nahi chahiye. Ek baar Save + Test karne ke baad yeh box khud collapse ho jayega, dobara key nahi daalni padegi.</p>
            <div class="flex-gap" style="margin-top:8px;">
              <button class="btn flex-1" data-action="save-gemini-key">Save</button>
              <button class="btn-outline flex-1" data-action="test-gemini-key">🔌 Test Connection</button>
            </div>
            ${state.aiTestLoading ? '<p class="muted" style="margin-top:8px;">⏳ Test ho raha hai…</p>' : ""}
            ${state.aiTestResult ? `<p class="${state.aiTestResult.startsWith("✅")?"status-msg":"error-msg"}" style="margin-top:8px;">${esc(state.aiTestResult)}</p>` : ""}
            <p class="muted" style="margin-top:8px;">Key sirf isi browser mein (localStorage) save hoti hai, kahi bhi hamare server par nahi jaati — sirf seedha Google Gemini ko jaati hai.</p>
          ` : ""}

          <div class="divider"></div>
          <h3 class="section-title" style="color:var(--brass);">📎 Company Presentation (Email Attachment)</h3>
          <p class="muted" style="margin-bottom:8px;">Ek baar apni company presentation (PDF/PPT) upload kar do — Email AI tab mein har buyer ko bhejte waqt isse attach kar sakte ho, dobara upload nahi karna padega.</p>
          ${(() => { const pm = getPresentationMeta(); return pm ? `
            <p class="ink">📄 ${esc(pm.name)} <span class="muted">(${(pm.size/1024/1024).toFixed(2)} MB)</span></p>
            <button class="btn-outline" data-action="remove-presentation">🗑 Remove Presentation</button>
          ` : '<p class="muted">Abhi koi presentation upload nahi hai.</p>'; })()}
          <input type="file" id="presentationInput" accept=".pdf,.ppt,.pptx" class="hidden" />
          <button class="btn" style="width:100%;margin-top:8px;" data-action="presentation-trigger">⬆ Presentation Upload/Update Karein</button>
          ${state.presentationStatus ? `<p class="${state.presentationStatus.startsWith("✅")?"status-msg":"error-msg"}" style="margin-top:8px;">${esc(state.presentationStatus)}</p>` : ""}

          <div class="divider"></div>
          <h3 class="section-title" style="color:var(--brass);">☁ Cloud Sync</h3>

          <button class="btn" style="width:100%;margin-bottom:8px;" data-action="cloud-save">☁ Save (Cloud Par Bhejein)</button>

            <div class="card" style="margin-top:10px;">
              <p class="ink">Cloud mein ${state.cloudUploadPending.buyers.length} buyers, ${state.cloudUploadPending.contacts.length} contacts, ${state.cloudUploadPending.products.length} products, ${state.cloudUploadPending.tasks.length} tasks mile.</p>
              <p class="error-msg">Upload karne se current local data cloud wale se replace ho jayega. Confirm karein?</p>
              <div class="flex-gap">
                <button class="btn flex-1" data-action="confirm-cloud-upload">Confirm Upload</button>
                <button class="btn-outline flex-1" data-action="cancel-cloud-upload">Cancel</button>
              </div>
            </div>` : ""}

          <div class="divider"></div>
          <h3 class="section-title" style="color:var(--brass);">Backup & Restore</h3>
          <p class="muted" style="margin-bottom:8px;">Pura data (buyers, contacts, products, tasks) ek JSON file mein save karein — device kho jaaye ya browser data clear ho to yeh file se sab wapas aa jayega.</p>
          <button class="btn" style="width:100%;margin-bottom:8px;" data-action="download-backup">⬇ Backup Download Karein</button>

            ${state.pinSetupStatus ? `<p class="status-msg">${esc(state.pinSetupStatus)}</p>` : ""}
            <div class="flex-gap">

              ${state.pin ? `<button class="btn-outline flex-1" data-action="remove-pin">PIN Hataayein</button>` : ""}
            </div>
          </div>

          <button class="btn-outline" style="width:100%;margin-top:18px;" data-action="close-settings">⬅ Back</button>
        </div>
      </div></div>`;
  }

  if (state.emailConfirmOpen) {
    const ef = state.emailForm;
    const b = state.buyers.find(x => x.id === ef.buyerId);
    const { subject, body } = parseEmailResult(state.emailResult);
    const pm = getPresentationMeta();
    out += `<div class="modal-bg" data-action="close-modal" data-which="emailConfirm">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>👁 Review &amp; Confirm — Send Email</h3><button class="close-x" data-action="close-modal" data-which="emailConfirm">✕</button></div>
        <div class="modal-body">
          <p class="ink"><span class="muted">To:</span> ${esc(b ? b.name + " (" + b.company + ")" : "—")} — ${b && b.email ? esc(b.email) : '<span style="color:var(--thread);">Email address missing! Buyer profile mein add karein.</span>'}</p>
          <p class="ink"><span class="muted">Subject:</span> ${esc(subject)}</p>
          <div class="card whitespace" style="max-height:220px;overflow:auto;">${esc(body)}</div>
          <p class="muted" style="margin-top:8px;">📎 Attachment: ${state.emailAttachPresentation && pm ? esc(pm.name) : "Koi nahi"}</p>
          ${state.emailSendStatus ? `<p class="status-msg" style="margin-top:8px;">${esc(state.emailSendStatus)}</p>` : ""}
          <p class="muted" style="margin-top:8px;">Confirm karne par yeh contact history mein bhi automatically log ho jayega.</p>

            <button class="btn-outline flex-1" data-action="back-to-edit-email">✏️ Wapas Edit Karein</button>
            <button class="btn flex-1" ${b && b.email ? "" : "disabled"} data-action="confirm-send-email">✅ Confirm &amp; Send</button>
          </div>
        </div>
      </div></div>`;
  }

  return out;
}

/* ---------- excel import ---------- */
async function parseExcelFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
  const norm = (s) => String(s).toLowerCase().replace(/[^a-z0-9]/g, "");
  const pick = (row, ...keys) => {
    const rowKeys = Object.keys(row);
    for (const k of keys) { const m = rowKeys.find(rk => norm(rk) === norm(k)); if (m) return String(row[m] ?? "").trim(); }
    return "";
  };
  return rows.map(row => ({
    id: uid(),
    name: pick(row,"buyername","name","buyer"), company: pick(row,"company","companyname"),
    country: pick(row,"country"), website: pick(row,"website","site"), email: pick(row,"email"),
    phone: pick(row,"phone","mobile","contact"), linkedin: pick(row,"linkedin"),
    category: pick(row,"productcategory","category"), moq: pick(row,"moq"),
    annualImport: pick(row,"annualimportdata","annualimport","importvolume"),
    priority: (pick(row,"priority")||"B").toUpperCase().charAt(0) || "B",
  })).filter(b => b.name || b.company);
}

          sentVia = "Share sheet (attachment ke saath — email app mein manually 'To' field mein buyer ka email daalna hoga: " + b.email + ")";

  bind("run-discover", async () => {

    }
    state.discoverLoading = true; state.discoverResults = null; state.discoverError = ""; state.discoverProgress = ""; render();
    const country = state.searchCountry.trim(); const category = state.searchCategory.trim();
    const criteria = [country ? `country: ${country}` : "", category ? `product category: ${category}` : ""].filter(Boolean).join(", ");
    const TARGET = 50;
    const MAX_BATCHES = 7;
    const collected = [];
    const seen = new Set();
    let lastRawError = "";
    for (let batch = 0; batch < MAX_BATCHES && collected.length < TARGET; batch++) {
      state.discoverProgress = `Batch ${batch + 1}/${MAX_BATCHES} search kar rahe hain… (ab tak ${collected.length} buyers mile)`;
      render();
      const excludeList = collected.map(c => c.company).filter(Boolean).slice(-40).join("; ");
      const prompt = `Web search karke home furnishing / home textile import, wholesale, ya retail business mein active REAL companies dhundo jo in criteria se match karti hain — ${criteria}. Is batch mein kam se kam 10-15 NAYI companies do jo pehle list nahi ki gayi hain${excludeList ? ` (yeh already list mein hain, inhe repeat mat karna: ${excludeList})` : ""}. Har company ke liye pata karo: company ka pura naam, desh, official website (agar mile), product category, aur ek chhoti note. SIRF real, verifiable, publicly known companies do — agar pakka confirm na ho to woh company list mein mat daalo. Research ke baad SIRF neeche diya JSON array format return karo, koi aur text pehle ya baad mein nahi:\n[{"company":"","country":"","website":"","category":"","notes":""}]`;
      let raw = "";
      try {
        raw = await callClaudeWithSearch(prompt, 3800);
      } catch (e) {
        // transient/rate-limit error — thoda ruk kar ek baar aur try karein
        await sleep(1500);
        try { raw = await callClaudeWithSearch(prompt, 3800); }
        catch (e2) { lastRawError = e2.message || String(e2); await sleep(800); continue; }
      }
      try {
        const clean = raw.replace(/```json|```/g, "").trim();
        const m = clean.match(/\[[\s\S]*\]/);
        if (!m) { lastRawError = "JSON format nahi mila is batch mein"; await sleep(800); continue; }
        const parsed = JSON.parse(m[0]);
        for (const r of parsed) {
          const key = (r.company || "").trim().toLowerCase();
          if (!key || seen.has(key)) continue;
          seen.add(key);
          collected.push(r);
        }
      } catch (e) {
        lastRawError = e.message || String(e);
        // ek batch fail ho jaaye to poora search mat rokein, agla batch try karein
        await sleep(800);
        continue;
      }
      await sleep(500); // batches ke beech thoda gap, taaki rapid-fire calls se rate-limit na lage
    }
    if (collected.length === 0) {
      state.discoverError = `Search mein koi result nahi mila — ya country/category thoda specific likhein.${lastRawError ? " [detail: " + lastRawError + "]" : ""}`;
    } else {
      // Show results for manual review — flag any that already exist in the database
      // so "Add" is disabled for them (no duplicates), but nothing is saved until
      // the user explicitly clicks Add.
      const existingKeys = new Set(state.buyers.map(b => (b.company || "").trim().toLowerCase()));
      state.discoverResults = collected.map(r => ({
        ...r, __id: uid(), added: false,
        wasDuplicate: !!(r.company && existingKeys.has(r.company.trim().toLowerCase()))
      }));
      if (collected.length < TARGET) {
        state.discoverError = `${collected.length} buyers mile (target ${TARGET} tha) — is niche/country mein itni hi verifiable companies mil paayi. Category/country thoda broad kar ke dobara try karein to zyada mil sakte hain.`;
      }
    }
    state.discoverProgress = ""; state.discoverLoading = false; render();
  });

    r.removed = true; render();

  bind("run-lookup", async () => {
    state.lookupName = val("lookupName");
    if (!state.lookupName.trim()) return;
    if (!localStorage.getItem("geminiApiKey")) {
      state.lookupError = aiErrorMessage({ message: "NO_KEY" });
      render();
      return;
    }
    state.lookupLoading = true; state.lookupResult = null; state.lookupError = ""; state.lookupSaved = false; state.lookupWasDuplicate = false; render();
    const prompt = `Web search karke "${state.lookupName}" naam ki company/buyer ke baare mein public jaankari dhundo — yeh home furnishing, home textile, ya import/wholesale business context mein ho sakta hai. Pata karo: company ka pura naam, desh, official website, business/product category, aur ek chhoti si note. Agar reliable public info nahi milti to fields khaali chodo aur note mein likho. Research karne ke baad SIRF neeche diya JSON format return karo, koi aur text nahi:\n{"company":"","country":"","website":"","category":"","notes":""}`;
    try {
      const raw = await callClaudeWithSearch(prompt, 1200);
      const clean = raw.replace(/\`\`\`json|\`\`\`/g, "").trim();
      const m = clean.match(/\{[\s\S]*\}/);
      state.lookupResult = JSON.parse(m ? m[0] : clean);
      // Auto-save straight into the permanent Buyer Database — no manual "Add" click needed.
      const company = (state.lookupResult.company || state.lookupName).trim();
      const key = company.toLowerCase();
      const dup = state.buyers.some(b => (b.company || "").trim().toLowerCase() === key);
      if (dup) {
        state.lookupWasDuplicate = true;
      } else if (company) {
        state.buyers.push({ ...emptyBuyer(), name: state.lookupName, company, country: state.lookupResult.country || "", website: state.lookupResult.website || "", category: state.lookupResult.category || "" });
        persist("buyers-list", "buyers");
        state.lookupSaved = true;
      }
    } catch (e) {
      state.lookupError = aiErrorMessage(e) + (e.message === "NO_KEY" ? "" : " — ya naam thoda specific likhein.");
    }
    state.lookupLoading = false; render();
  });
  bind("edit-lookup-result", () => {
    const r = state.lookupResult;
    const existing = state.buyers.find(b => (b.company||"").trim().toLowerCase() === (r.company||state.lookupName).trim().toLowerCase());
    state.editBuyer = existing ? { ...existing } : { ...emptyBuyer(), name: state.lookupName, company: r.company||state.lookupName, country: r.country||"", website: r.website||"", category: r.category||"" };
    state.tab = "buyers"; render();
  });

  bind("open-quickfind", () => { state.quickFindOpen = true; state.quickFindQuery = ""; render(); });
  bind("close-quickfind", () => { state.quickFindOpen = false; render(); });
  bind("quickfind-goto", (el) => { state.tab = el.dataset.tab; state.quickFindOpen = false; render(); });

  bind("open-settings", () => { state.settingsOpen = true; state.restorePending = null; state.restoreStatus = ""; state.backupStatus = ""; state.pinSetupValue = ""; state.pinSetupStatus = ""; state.cloudSaveStatus = ""; state.cloudUploadStatus = ""; state.cloudUploadPending = null; state.aiSettingsOpen = !localStorage.getItem("geminiApiKey"); state.aiTestResult = ""; render(); });
  bind("close-settings", () => { state.settingsOpen = false; render(); });
  bind("toggle-ai-settings", () => { state.aiSettingsOpen = !state.aiSettingsOpen; render(); });
  bind("save-gemini-key", () => {
    const key = (val("geminiKeyInput") || "").trim();
    if (!key) { state.aiTestResult = "❌ Pehle key paste karo."; render(); return; }
    localStorage.setItem("geminiApiKey", key);
    localStorage.setItem("geminiTestOk", "false"); // force a fresh test after any key change
    state.aiTestResult = "Key save ho gayi. Ab \"Test Connection\" dabao.";
    render();
  });
  bind("test-gemini-key", async () => {
    const key = (val("geminiKeyInput") || "").trim();
    if (!key) { state.aiTestResult = "❌ Pehle key upar box mein daalo."; render(); return; }
    state.aiTestLoading = true; state.aiTestResult = ""; render();
    try {
      const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${key}`, {
        method: "POST", headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ role: "user", parts: [{ text: "Reply with only the word: OK" }] }] })
      });
      const data = await res.json();
      if (data.error) throw new Error(`HTTP ${res.status} — ${data.error.message}`);
      const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || JSON.stringify(data);
      localStorage.setItem("geminiApiKey", key);
      localStorage.setItem("geminiTestOk", "true");
      state.aiTestResult = `✅ Connection ho gaya! Reply mila: "${reply.trim()}"`;
      state.aiSettingsOpen = false;
    } catch (e) {
      localStorage.setItem("geminiTestOk", "false");
      state.aiTestResult = `❌ Connection FAIL hua. Exact error: ${e.message}`;
    }
    state.aiTestLoading = false; render();
  });

  bind("presentation-trigger", () => { document.getElementById("presentationInput").click(); });
  bind("remove-presentation", () => {
    localStorage.removeItem("companyPresentationMeta");
    state.presentationStatus = "Presentation hata di gayi.";
    state.emailAttachPresentation = false;
    render();
  });
  const presInput = document.getElementById("presentationInput");
  if (presInput) presInput.addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 4 * 1024 * 1024) {
      state.presentationStatus = "❌ File 4 MB se badi hai — is browser storage mein itni badi file save nahi ho sakti. Chhoti/compressed file try karein.";
      render();
      return;
    }
    try {
      const dataUrl = await fileToDataUrl(file);
      localStorage.setItem("companyPresentationMeta", JSON.stringify({ name: file.name, size: file.size, type: file.type, dataUrl }));
      state.presentationStatus = `✅ "${file.name}" upload ho gayi — ab Email AI tab mein attach kar sakte ho.`;
    } catch (err) {
      state.presentationStatus = "❌ Upload fail hua: " + err.message;
    }
    render();
  });

  bind("cloud-save", () => { cloudPushAll(); });
  bind("cloud-upload", () => { cloudPullAll(); });
  bind("confirm-cloud-upload", () => { confirmCloudPull(); });
  bind("cancel-cloud-upload", () => { state.cloudUploadPending = null; render(); });

  bind("download-backup", () => {
    const payload = { buyers: state.buyers, contacts: state.contacts, products: state.products, tasks: state.tasks, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `export-crm-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    state.backupStatus = "Backup download ho gaya ✓"; render();
    setTimeout(() => { state.backupStatus = ""; render(); }, 4000);
  });

  bind("restore-trigger", () => { document.getElementById("restoreInput").click(); });
  bind("confirm-restore", () => {
    const d = state.restorePending;
    state.buyers = d.buyers || []; state.contacts = d.contacts || []; state.products = d.products || []; state.tasks = d.tasks || [];
    persist("buyers-list","buyers"); persist("contacts-list","contacts"); persist("products-list","products"); persist("tasks-list","tasks");
    state.restorePending = null; state.restoreStatus = "Data restore ho gaya ✓"; render();
  });
  bind("cancel-restore", () => { state.restorePending = null; render(); });

  bind("save-pin", () => {
    const v = val("pinSetupInput").trim();
    if (!/^[0-9]{4,6}$/.test(v)) { state.pinSetupStatus = "PIN 4-6 digit ka number hona chahiye."; render(); return; }
    state.pin = v; storage.set("app-pin", v);
    state.pinSetupStatus = "PIN set ho gaya ✓"; state.pinSetupValue = "";
    render();
  });
  bind("remove-pin", () => {
    state.pin = null; storage.set("app-pin", null);
    state.pinSetupStatus = "PIN hata diya gaya."; render();
  });

  const quickFindInput = document.getElementById("quickFindInput");
  if (quickFindInput) quickFindInput.addEventListener("input", () => { state.quickFindQuery = quickFindInput.value; render(); });
  const pinSetupInput = document.getElementById("pinSetupInput");
  if (pinSetupInput) pinSetupInput.addEventListener("input", () => { state.pinSetupValue = pinSetupInput.value; });
  const restoreInput = document.getElementById("restoreInput");
  if (restoreInput) restoreInput.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed.buyers || !parsed.contacts || !parsed.products || !parsed.tasks) throw new Error("invalid");
      state.restorePending = parsed; state.restoreStatus = "";
    } catch (err) { state.restoreStatus = "Yeh valid backup file nahi hai."; }
    render();
  });

  bind("excel-trigger", () => { document.getElementById("excelInput").click(); });

  // plain input listeners (search filters + file input) need to be bound after render too
  const sc = document.getElementById("searchCountry"); if (sc) sc.addEventListener("input", () => { state.searchCountry = sc.value; renderSearchListOnly(); });
  const scat = document.getElementById("searchCategory"); if (scat) scat.addEventListener("input", () => { state.searchCategory = scat.value; renderSearchListOnly(); });
  const fi = document.getElementById("excelInput");
  if (fi) fi.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    state.importStatus = "Padha ja raha hai...";
    try {
      const parsed = await parseExcelFile(file);
      if (parsed.length === 0) state.importStatus = "Koi valid row nahi mili. Columns check karein.";
      else { state.buyers = [...state.buyers, ...parsed]; persist("buyers-list","buyers"); state.importStatus = parsed.length + " buyers import ho gaye ✓"; }
    } catch (err) { state.importStatus = "File padhne mein error aayi. .xlsx ya .csv try karein."; }
    render();
    setTimeout(() => { state.importStatus = ""; render(); }, 5000);
  });
}
function bind(action, handler) {
  document.querySelectorAll(`[data-action="${action}"]`).forEach(el => el.addEventListener("click", () => handler(el)));
}
function val(id) { const el = document.getElementById(id); return el ? el.value : ""; }
function renderSearchListOnly() { render(); } // simple full re-render keeps logic simple & correct

loadAll();
</script>
</body>
</html>
