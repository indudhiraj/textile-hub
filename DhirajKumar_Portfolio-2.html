<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dhiraj Kumar | Production Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C; --gold-light: #E8C97A;
    --dark: #0D0D0D; --dark2: #141414; --dark3: #1C1C1C; --dark4: #242424;
    --text: #E8E0D0; --text-muted: #9A9080;
    --accent: #8B1A1A; --accent2: #B22222;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior:smooth; }
  body { background:var(--dark); color:var(--text); font-family:'DM Sans',sans-serif; overflow-x:hidden; }
  body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events:none; z-index:0; opacity:0.4; }

  /* NAV */
  nav { position:fixed; top:0; left:0; right:0; z-index:100; display:flex; justify-content:space-between; align-items:center; padding:20px 60px; background:rgba(13,13,13,0.92); backdrop-filter:blur(12px); border-bottom:1px solid rgba(201,168,76,0.15); }
  .nav-logo { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--gold); letter-spacing:2px; }
  .nav-links { display:flex; gap:36px; list-style:none; }
  .nav-links a { color:var(--text-muted); text-decoration:none; font-size:0.82rem; letter-spacing:2px; text-transform:uppercase; transition:color 0.3s; }
  .nav-links a:hover { color:var(--gold); }

  /* HERO */
  .hero { min-height:100vh; display:flex; align-items:center; padding:120px 60px 80px; position:relative; overflow:hidden; }
  .hero-bg { position:absolute; inset:0; background:radial-gradient(ellipse 60% 70% at 80% 50%, rgba(139,26,26,0.12) 0%, transparent 60%), radial-gradient(ellipse 40% 50% at 20% 80%, rgba(201,168,76,0.07) 0%, transparent 50%); }
  .hero-grid { display:grid; grid-template-columns:1fr 420px; gap:80px; align-items:center; max-width:1200px; margin:0 auto; width:100%; position:relative; z-index:1; }
  .hero-tag { display:inline-block; font-size:0.72rem; letter-spacing:4px; text-transform:uppercase; color:var(--gold); border:1px solid rgba(201,168,76,0.3); padding:6px 16px; margin-bottom:28px; animation:fadeUp 0.8s ease both; }
  .hero-name { font-family:'Playfair Display',serif; font-size:clamp(3rem,5vw,5.5rem); font-weight:900; line-height:1.05; color:var(--text); animation:fadeUp 0.8s 0.1s ease both; }
  .hero-name span { color:var(--gold); }
  .hero-title { font-size:1rem; color:var(--text-muted); letter-spacing:3px; text-transform:uppercase; margin-top:16px; margin-bottom:32px; animation:fadeUp 0.8s 0.2s ease both; }
  .hero-summary { font-size:1rem; line-height:1.8; color:rgba(232,224,208,0.75); max-width:560px; animation:fadeUp 0.8s 0.3s ease both; }
  .hero-stats { display:flex; gap:48px; margin-top:48px; animation:fadeUp 0.8s 0.4s ease both; }
  .stat-num { font-family:'Playfair Display',serif; font-size:2.8rem; font-weight:700; color:var(--gold); line-height:1; }
  .stat-label { font-size:0.72rem; color:var(--text-muted); letter-spacing:2px; text-transform:uppercase; margin-top:6px; }
  .hero-cta { display:flex; gap:16px; margin-top:48px; animation:fadeUp 0.8s 0.5s ease both; }
  .btn-primary { background:var(--gold); color:var(--dark); padding:14px 32px; font-size:0.82rem; letter-spacing:2px; text-transform:uppercase; text-decoration:none; font-weight:600; transition:all 0.3s; border:none; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .btn-primary:hover { background:var(--gold-light); transform:translateY(-2px); }
  .btn-outline { background:transparent; color:var(--gold); padding:14px 32px; font-size:0.82rem; letter-spacing:2px; text-transform:uppercase; text-decoration:none; font-weight:600; border:1px solid rgba(201,168,76,0.4); transition:all 0.3s; }
  .btn-outline:hover { border-color:var(--gold); background:rgba(201,168,76,0.05); }
  .hero-photo-wrap { position:relative; animation:fadeIn 1s 0.3s ease both; }
  .photo-frame { width:340px; height:400px; position:relative; margin:0 auto; }
  .photo-frame::before { content:''; position:absolute; inset:-12px; border:1px solid rgba(201,168,76,0.3); z-index:0; }
  .photo-frame::after { content:''; position:absolute; bottom:-24px; right:-24px; width:120px; height:120px; background:var(--accent); opacity:0.3; z-index:0; }
  .photo-frame img { width:100%; height:100%; object-fit:cover; object-position:center top; position:relative; z-index:1; filter:grayscale(20%) contrast(1.05); }
  .photo-badge { position:absolute; bottom:-16px; left:-16px; background:var(--gold); color:var(--dark); padding:12px 20px; font-size:0.72rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; z-index:2; }

  /* DIVIDER */
  .section-divider { display:flex; align-items:center; gap:20px; margin-bottom:60px; }
  .divider-line { flex:1; height:1px; background:rgba(201,168,76,0.2); }
  .divider-dot { width:6px; height:6px; background:var(--gold); transform:rotate(45deg); }

  /* SECTIONS */
  section { padding:100px 60px; max-width:1200px; margin:0 auto; position:relative; z-index:1; }
  .section-label { font-size:0.72rem; letter-spacing:5px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
  .section-title { font-family:'Playfair Display',serif; font-size:clamp(2rem,3.5vw,3rem); font-weight:700; color:var(--text); margin-bottom:60px; }

  /* SKILLS */
  .skills-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(200px,1fr)); gap:2px; }
  .skill-item { background:var(--dark3); padding:20px 24px; font-size:0.85rem; color:var(--text-muted); border-left:2px solid transparent; transition:all 0.3s; cursor:default; display:flex; align-items:center; justify-content:space-between; }
  .skill-item:hover { border-left-color:var(--gold); color:var(--text); background:var(--dark4); padding-left:32px; }

  /* EXPERTISE */
  .expertise-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
  .expertise-card { background:var(--dark3); padding:40px 32px; position:relative; overflow:hidden; transition:all 0.4s; }
  .expertise-card::before { content:''; position:absolute; top:0; left:0; width:100%; height:3px; background:var(--gold); transform:scaleX(0); transition:transform 0.4s; }
  .expertise-card:hover::before { transform:scaleX(1); }
  .expertise-card:hover { background:var(--dark4); }
  .expertise-icon { font-size:2rem; margin-bottom:20px; }
  .expertise-title { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--gold); margin-bottom:12px; }
  .expertise-desc { font-size:0.85rem; line-height:1.7; color:var(--text-muted); }

  /* EXPERIENCE */
  .timeline { position:relative; }
  .timeline::before { content:''; position:absolute; left:0; top:0; bottom:0; width:1px; background:rgba(201,168,76,0.2); }
  .timeline-item { padding-left:48px; padding-bottom:60px; position:relative; }
  .timeline-item::before { content:''; position:absolute; left:-4px; top:6px; width:9px; height:9px; background:var(--gold); transform:rotate(45deg); }
  .timeline-period { font-size:0.72rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:8px; }
  .timeline-role { font-family:'Playfair Display',serif; font-size:1.3rem; color:var(--text); margin-bottom:4px; }
  .timeline-company { font-size:0.9rem; color:var(--text-muted); margin-bottom:16px; letter-spacing:1px; }
  .timeline-points { list-style:none; }
  .timeline-points li { font-size:0.88rem; color:rgba(232,224,208,0.7); padding:6px 0 6px 16px; position:relative; line-height:1.6; }
  .timeline-points li::before { content:'—'; position:absolute; left:0; color:var(--gold); opacity:0.6; }

  /* PROJECTS */
  .projects-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
  .project-card { background:var(--dark3); padding:32px 28px; position:relative; overflow:hidden; transition:all 0.4s; cursor:default; }
  .project-card::after { content:''; position:absolute; bottom:0; right:0; width:60px; height:60px; background:var(--accent); opacity:0; transition:opacity 0.4s; clip-path:polygon(100% 0,100% 100%,0 100%); }
  .project-card:hover { background:var(--dark4); transform:translateY(-4px); }
  .project-card:hover::after { opacity:0.4; }
  .project-num { font-family:'Playfair Display',serif; font-size:3rem; font-weight:900; color:rgba(201,168,76,0.08); position:absolute; top:16px; right:20px; line-height:1; }
  .project-tag { font-size:0.65rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:12px; display:block; }
  .project-name { font-family:'Playfair Display',serif; font-size:1rem; color:var(--text); margin-bottom:10px; line-height:1.4; }
  .project-desc { font-size:0.8rem; color:var(--text-muted); line-height:1.6; }

  /* PRODUCTS */
  .products-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(150px,1fr)); gap:12px; }
  .product-img-card { background:var(--dark3); border:1px solid rgba(201,168,76,0.12); overflow:hidden; transition:all 0.35s; position:relative; cursor:default; }
  .product-img-card:hover { border-color:rgba(201,168,76,0.45); transform:translateY(-3px); box-shadow:0 8px 32px rgba(0,0,0,0.5); }
  /* Gallery slider */
  .product-gallery { width:100%; aspect-ratio:1/1; position:relative; overflow:hidden; background:var(--dark4); }
  .product-gallery-track { display:flex; height:100%; transition:transform 0.35s cubic-bezier(.4,0,.2,1); will-change:transform; }
  .product-gallery-slide { min-width:100%; height:100%; position:relative; flex-shrink:0; }
  .product-gallery-slide img { width:100%; height:100%; object-fit:cover; display:block; }
  .product-img-placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; color:var(--text-muted); font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; width:100%; height:100%; }
  .product-img-placeholder svg { opacity:0.25; }
  /* Nav arrows */
  .gallery-arrow { position:absolute; top:50%; transform:translateY(-50%); background:rgba(13,13,13,0.7); border:1px solid rgba(201,168,76,0.3); color:var(--gold); width:24px; height:24px; font-size:0.8rem; cursor:pointer; z-index:4; display:flex; align-items:center; justify-content:center; transition:all 0.2s; opacity:0; pointer-events:none; }
  .product-img-card:hover .gallery-arrow { opacity:1; pointer-events:all; }
  .gallery-arrow:hover { background:rgba(201,168,76,0.2); }
  .gallery-arrow.prev { left:4px; }
  .gallery-arrow.next { right:4px; }
  /* Dots */
  .gallery-dots { position:absolute; bottom:5px; left:0; right:0; display:flex; justify-content:center; gap:4px; z-index:4; }
  .gallery-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.35); transition:background 0.2s; cursor:pointer; border:none; padding:0; }
  .gallery-dot.active { background:var(--gold); }
  /* Count badge */
  .gallery-count { position:absolute; top:6px; left:6px; background:rgba(13,13,13,0.75); color:var(--text-muted); font-size:0.58rem; letter-spacing:1px; padding:2px 7px; z-index:4; display:none; }
  .product-img-card:hover .gallery-count { display:block; }
  /* Admin overlay */
  .product-img-overlay { position:absolute; inset:0; background:rgba(13,13,13,0.78); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; opacity:0; transition:opacity 0.25s; z-index:5; pointer-events:none; }
  .admin-mode .product-img-card:hover .product-img-overlay { opacity:1; pointer-events:all; }
  .product-img-upload-btn { background:var(--gold); color:var(--dark); border:none; padding:6px 14px; font-size:0.62rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:700; transition:background 0.2s; }
  .product-img-upload-btn:hover { background:var(--gold-light); }
  .product-img-del-img-btn { background:transparent; color:#ff6b6b; border:1px solid rgba(255,107,107,0.4); padding:4px 12px; font-size:0.58rem; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .product-img-del-img-btn:hover { background:rgba(255,107,107,0.1); }
  .product-img-info { padding:10px 12px 12px; }
  .product-img-name { font-size:0.8rem; color:var(--text); line-height:1.35; font-weight:500; }
  .product-card-actions { position:absolute; top:6px; right:6px; display:none; gap:4px; z-index:6; }
  .admin-mode .product-card-actions { display:flex; }
  .product-del-btn { background:rgba(13,13,13,0.85); border:1px solid rgba(255,107,107,0.3); color:#ff6b6b; width:22px; height:22px; font-size:0.7rem; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; }
  .product-del-btn:hover { background:rgba(255,107,107,0.15); }
  @media(max-width:600px){ .products-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; } }

  /* BUYERS */
  .buyers-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:2px; }
  .buyer-card { background:var(--dark3); padding:24px; text-align:center; font-size:0.85rem; color:var(--text-muted); letter-spacing:1px; transition:all 0.3s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .buyer-card:hover { background:var(--dark4); color:var(--gold); }

  /* EDUCATION */
  .edu-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:2px; }
  .edu-card { background:var(--dark3); padding:36px 32px; border-bottom:2px solid transparent; transition:all 0.3s; }
  .edu-card:hover { border-bottom-color:var(--gold); }
  .edu-degree { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--text); margin-bottom:8px; }
  .edu-institution { font-size:0.85rem; color:var(--gold); margin-bottom:6px; }
  .edu-year { font-size:0.75rem; color:var(--text-muted); letter-spacing:2px; }

  /* CONTACT */
  .contact-section { background:linear-gradient(135deg,var(--dark2) 0%,var(--dark3) 100%); padding:100px 60px; position:relative; overflow:hidden; }
  .contact-section::before { content:''; position:absolute; top:-100px; right:-100px; width:400px; height:400px; border:1px solid rgba(201,168,76,0.1); border-radius:50%; }
  .contact-section::after { content:''; position:absolute; bottom:-150px; left:-150px; width:500px; height:500px; border:1px solid rgba(201,168,76,0.06); border-radius:50%; }
  .contact-inner { max-width:1200px; margin:0 auto; display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; position:relative; z-index:1; }
  .contact-items { display:flex; flex-direction:column; gap:28px; }
  .contact-item { display:flex; align-items:center; gap:20px; }
  .contact-icon { width:48px; height:48px; border:1px solid rgba(201,168,76,0.3); display:flex; align-items:center; justify-content:center; font-size:1.2rem; flex-shrink:0; }
  .contact-label { font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
  .contact-value { font-size:0.95rem; color:var(--text); }

  /* FOOTER */
  footer { background:var(--dark); padding:32px 60px; display:flex; justify-content:space-between; align-items:center; border-top:1px solid rgba(201,168,76,0.1); position:relative; z-index:1; }
  footer p { font-size:0.78rem; color:var(--text-muted); letter-spacing:1px; }
  .footer-logo { font-family:'Playfair Display',serif; font-size:1rem; color:var(--gold); }

  /* ANIMATIONS */
  @keyframes fadeUp { from{opacity:0;transform:translateY(30px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn { from{opacity:0} to{opacity:1} }
  @keyframes spin { to { transform:rotate(360deg); } }
  .reveal { opacity:0; transform:translateY(40px); transition:opacity 0.7s ease,transform 0.7s ease; }
  .reveal.visible { opacity:1; transform:translateY(0); }

  /* RESPONSIVE */
  @media(max-width:900px){
    nav{padding:16px 24px} .nav-links{gap:20px} .hero{padding:100px 24px 60px}
    .hero-grid{grid-template-columns:1fr;gap:48px} .hero-photo-wrap{order:-1}
    .photo-frame{width:240px;height:280px} section{padding:60px 24px}
    .expertise-grid{grid-template-columns:1fr} .projects-grid{grid-template-columns:repeat(2,1fr)}
    .buyers-grid{grid-template-columns:repeat(2,1fr)} .edu-grid{grid-template-columns:1fr}
    .contact-inner{grid-template-columns:1fr;gap:40px} footer{flex-direction:column;gap:12px;text-align:center}
  }
  @media(max-width:600px){
    .nav-links{display:none} .hero-stats{gap:28px;flex-wrap:wrap} .hero-cta{flex-direction:column}
    .projects-grid{grid-template-columns:1fr} .skills-grid{grid-template-columns:1fr 1fr}
    .buyers-grid{grid-template-columns:repeat(2,1fr)} .contact-section{padding:60px 24px}
  }

  /* ═══════════════════════════════════
     ADMIN STYLES
  ═══════════════════════════════════ */

  /* Admin bar */
  .admin-bar { position:fixed; bottom:0; left:0; right:0; z-index:500; background:rgba(13,13,13,0.97); border-top:2px solid var(--gold); padding:10px 24px; display:flex; align-items:center; gap:12px; backdrop-filter:blur(20px); flex-wrap:wrap; }
  .admin-label { font-size:0.68rem; letter-spacing:3px; text-transform:uppercase; color:var(--gold); font-weight:600; white-space:nowrap; }
  .admin-btn { background:transparent; color:var(--text-muted); border:1px solid rgba(232,224,208,0.15); padding:6px 14px; font-size:0.7rem; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; white-space:nowrap; }
  .admin-btn:hover { color:var(--text); border-color:rgba(232,224,208,0.4); }
  .admin-btn.gold { color:var(--gold); border-color:rgba(201,168,76,0.4); }
  .admin-btn.gold:hover { background:rgba(201,168,76,0.1); }
  .admin-btn.danger { color:#ff6b6b; border-color:rgba(255,107,107,0.3); }
  .admin-btn.danger:hover { background:rgba(255,107,107,0.1); }
  .admin-bar-right { margin-left:auto; display:flex; gap:10px; align-items:center; }
  #savedLabel { font-size:0.65rem; color:var(--text-muted); letter-spacing:1px; }

  /* Edit card buttons */
  .card-actions { display:none; gap:6px; margin-top:14px; flex-wrap:wrap; }
  .admin-mode .card-actions { display:flex; }
  .card-btn { background:transparent; border:1px solid rgba(232,224,208,0.15); color:var(--text-muted); padding:4px 10px; font-size:0.65rem; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; }
  .card-btn.edit-btn { color:var(--gold); border-color:rgba(201,168,76,0.3); }
  .card-btn.edit-btn:hover { background:rgba(201,168,76,0.1); }
  .card-btn.del-btn { color:#ff6b6b; border-color:rgba(255,107,107,0.2); }
  .card-btn.del-btn:hover { background:rgba(255,107,107,0.1); }

  /* Add buttons */
  .section-add-btn { display:none; background:none; border:1px dashed rgba(201,168,76,0.35); color:var(--gold); padding:8px 24px; font-size:0.7rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; transition:all 0.2s; margin-top:20px; }
  .admin-mode .section-add-btn { display:inline-block; }
  .section-add-btn:hover { background:rgba(201,168,76,0.05); border-color:var(--gold); }

  /* Contenteditable highlight */
  .admin-mode [contenteditable="true"] { outline:1px dashed rgba(201,168,76,0.35); min-height:1em; cursor:text; }
  .admin-mode [contenteditable="true"]:focus { outline:1px solid var(--gold); background:rgba(201,168,76,0.03); }

  /* Small delete buttons for tags */
  .tag-del-btn, .skill-del-btn { background:none; border:none; color:rgba(255,107,107,0.5); cursor:pointer; font-size:0.72rem; padding:0 2px; transition:color 0.2s; line-height:1; display:none; }
  .admin-mode .tag-del-btn, .admin-mode .skill-del-btn { display:inline; }
  .tag-del-btn:hover, .skill-del-btn:hover { color:#ff6b6b; }

  /* Project demo/github buttons */
  .proj-btn-wrap { display:flex; flex-wrap:wrap; gap:6px; margin-top:12px; }
  .project-demo-btn { background:var(--gold); color:var(--dark); border:none; padding:7px 14px; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:600; transition:all 0.2s; }
  .project-demo-btn:hover { background:var(--gold-light); }
  .project-github-btn { background:transparent; color:var(--gold); border:1px solid rgba(201,168,76,0.35); padding:7px 14px; font-size:0.68rem; letter-spacing:2px; text-transform:uppercase; cursor:pointer; font-family:'DM Sans',sans-serif; font-weight:600; transition:all 0.2s; }
  .project-github-btn:hover { background:rgba(201,168,76,0.08); border-color:var(--gold); }

  /* Photo edit */
  .edit-photo-btn { position:absolute; bottom:24px; left:50%; transform:translateX(-50%); background:rgba(13,13,13,0.88); border:1px solid var(--gold); color:var(--gold); padding:6px 14px; font-size:0.68rem; letter-spacing:1px; cursor:pointer; font-family:'DM Sans',sans-serif; z-index:5; display:none; white-space:nowrap; }
  .admin-mode .edit-photo-btn { display:block; }
  .edit-photo-btn:hover { background:rgba(201,168,76,0.1); }

  /* ── MODALS ── */

// ═══════════════════════════════════════════════════════════
// PASSWORD (SHA-256 via WebCrypto)
// ═══════════════════════════════════════════════════════════
async function sha256(text) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(text));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}
async function initPassword() {
  if (!localStorage.getItem('dk_admin_hash')) {
    localStorage.setItem('dk_admin_hash', await sha256('DK@Admin2026'));
  }
}
async function verifyPassword(input) {
  return (await sha256(input)) === localStorage.getItem('dk_admin_hash');
}

function openDemo(url, title) {
  if (!url) return;
  currentDemoUrl = url;
  document.getElementById('demoTitle').textContent = title;
  const frame = document.getElementById('demoFrame');
  const loading = document.getElementById('demoLoading');
  const fallback = document.getElementById('demoFallback');
  const normal = document.getElementById('demoNormal');
  frame.src = ''; frame.classList.remove('loaded');
  loading.style.display = 'flex'; fallback.style.display = 'none'; normal.style.display = 'inline';
  document.getElementById('demoModal').classList.add('active');
  // small delay then load
  setTimeout(()=>{ frame.src = url; }, 100);
  // fallback after 10s
  demoFallbackTimer = setTimeout(()=>{
    loading.style.display = 'none';
    fallback.style.display = 'inline';
    normal.style.display = 'none';
  }, 10000);
}
function demoLoaded(frame) {
  clearTimeout(demoFallbackTimer);
  document.getElementById('demoLoading').style.display = 'none';
  frame.classList.add('loaded');
  // Try to detect blank/blocked iframe
  try {
    const blank = !frame.contentDocument || frame.contentDocument.body.innerHTML === '';
    if (blank) {
      document.getElementById('demoFallback').style.display = 'inline';
      document.getElementById('demoNormal').style.display = 'none';
    }
  } catch(e) {
    // Cross-origin blocked — still show the frame (it may have loaded)
  }
}
function demoError() {
  clearTimeout(demoFallbackTimer);
  document.getElementById('demoLoading').style.display = 'none';
  document.getElementById('demoFallback').style.display = 'inline';
  document.getElementById('demoNormal').style.display = 'none';
}
function closeDemo() {
  clearTimeout(demoFallbackTimer);
  document.getElementById('demoModal').classList.remove('active');
  document.getElementById('demoFrame').src = '';
  currentDemoUrl = '';
}
function openDemoExternal() {
  if (currentDemoUrl) window.open(currentDemoUrl, '_blank', 'noopener,noreferrer');

function h(str) { // HTML escape
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function a(str) { // Attribute escape
  return String(str||'').replace(/'/g,'&#39;').replace(/"/g,'&quot;');
}
function el(tag, attrs, html) {
  const e = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v])=>{ if(v!==null&&v!==undefined) e.setAttribute(k,v); });
  if (html !== undefined) e.innerHTML = html;
  return e;
}
function div(cls, html) { const d=document.createElement('div'); if(cls) d.className=cls; if(html!==undefined) d.innerHTML=html; return d; }

const PRODUCT_PLACEHOLDER_SVG = `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;

// Gallery state: {cat_i: currentSlide}
const _galState = {};
function _galKey(cat,i){return cat+'_'+i;}

function _galSlides(item){
  // Support both old single img and new imgs array
  if(item.imgs && item.imgs.length) return item.imgs;
  if(item.img) return [item.img];
  return [];
}

function mkProductCard(cat, item, i) {
  const slides = _galSlides(item);
  const key = _galKey(cat,i);
  if(_galState[key]===undefined) _galState[key]=0;
  const cur = Math.min(_galState[key], Math.max(0,slides.length-1));

  const trackStyle = `transform:translateX(-${cur*100}%)`;
  const slideHTML = slides.length
    ? slides.map((src,si)=>`<div class="product-gallery-slide"><img src="${src}" alt="${h(item.name)}" loading="lazy"></div>`).join('')
    : `<div class="product-gallery-slide"><div class="product-img-placeholder">${PRODUCT_PLACEHOLDER_SVG}<span>No Image</span></div></div>`;

  const dotsHTML = slides.length > 1
    ? `<div class="gallery-dots">${slides.map((_,di)=>`<button class="gallery-dot${di===cur?' active':''}" onclick="galGoto('${cat}',${i},${di});event.stopPropagation()"></button>`).join('')}</div>`
    : '';
  const arrowsHTML = slides.length > 1 ? `
    <button class="gallery-arrow prev" onclick="galPrev('${cat}',${i});event.stopPropagation()">&#8249;</button>
    <button class="gallery-arrow next" onclick="galNext('${cat}',${i});event.stopPropagation()">&#8250;</button>` : '';
  const countHTML = slides.length > 1
    ? `<div class="gallery-count">${cur+1}/${slides.length}</div>` : '';

  const delImgBtn = slides.length
    ? `<button class="product-img-del-img-btn" onclick="delProductImage('${cat}',${i});event.stopPropagation()">🗑 Remove This Photo</button>` : '';

  return `
    <div class="product-img-card" id="pic_${key}">
      <div class="product-gallery">
        <div class="product-gallery-track" id="gtrack_${key}" style="${trackStyle}">${slideHTML}</div>
        ${arrowsHTML}
        ${dotsHTML}
        ${countHTML}
        <div class="product-img-overlay">
          <button class="product-img-upload-btn" onclick="uploadProductImage('${cat}',${i});event.stopPropagation()">📷 Add Photo</button>
          ${delImgBtn}
        </div>
      </div>
      <div class="product-card-actions">
        <button class="product-del-btn" title="Delete product" onclick="delProductTag('${cat}',${i})">×</button>
      </div>
      <div class="product-img-info">
        <div class="product-img-name" ${isAdmin?`contenteditable="true" data-pcat="${cat}" data-pidx="${i}"`:''}>${h(item.name)}</div>
      </div>
    </div>`;
}

function galGoto(cat,i,idx){
  const key=_galKey(cat,i);
  const item=data.products[cat][i];
  const slides=_galSlides(item);
  _galState[key]=Math.max(0,Math.min(idx,slides.length-1));
  _refreshGallery(cat,i);
}
function galPrev(cat,i){ const slides=_galSlides(data.products[cat][i]); galGoto(cat,i,((_galState[_galKey(cat,i)]||0)-1+slides.length)%slides.length); }
function galNext(cat,i){ const slides=_galSlides(data.products[cat][i]); galGoto(cat,i,((_galState[_galKey(cat,i)]||0)+1)%slides.length); }

function _refreshGallery(cat,i){
  const key=_galKey(cat,i);
  const card=document.getElementById('pic_'+key);
  if(!card) return;
  const item=data.products[cat][i];
  const slides=_galSlides(item);
  const cur=_galState[key]||0;
  const track=document.getElementById('gtrack_'+key);
  if(track) track.style.transform=`translateX(-${cur*100}%)`;
  card.querySelectorAll('.gallery-dot').forEach((d,di)=>d.classList.toggle('active',di===cur));
  const cnt=card.querySelector('.gallery-count');
  if(cnt) cnt.textContent=`${cur+1}/${slides.length}`;
}

function mkProducts() {
  const renderCards = (cat) => data.products[cat].map((item,i)=>mkProductCard(cat,item,i)).join('');
  const wrap = document.createElement('section');
  wrap.innerHTML = `

    <button class="section-add-btn" style="margin-bottom:40px;" onclick="addProductTag('homeFurnishing')">＋ Add Product</button>

  if (isAdmin) {

// Upload product image — adds to imgs array (multiple images)
function uploadProductImage(cat, i) {
  const inp = document.createElement('input');
  inp.type = 'file'; inp.accept = 'image/*'; inp.multiple = true;
  inp.onchange = function() {
    const files = Array.from(this.files); if(!files.length) return;
    let loaded = 0;
    files.forEach(function(file) {
      if(file.size > 3*1024*1024) { alert(file.name+' is too large — max 3 MB per image.'); loaded++; return; }
      const reader = new FileReader();
      reader.onload = function(e) {
        const item = data.products[cat][i];
        if(!item.imgs) item.imgs = item.img ? [item.img] : [];
        item.imgs.push(e.target.result);
        item.img = ''; // clear old single-img field
        loaded++;
        if(loaded === files.length) { saveData(); renderAll(); }
      };
      reader.readAsDataURL(file);
    });
  };
  inp.click();
}

// Delete currently visible image
function delProductImage(cat, i) {
  const item = data.products[cat][i];
  const slides = _galSlides(item);
  if(!slides.length) return;
  const key = _galKey(cat,i);
  const cur = _galState[key] || 0;
  if(!confirm('Remove this photo?')) return;
  if(item.imgs && item.imgs.length) {
    item.imgs.splice(cur, 1);
  } else {
    item.img = '';
  }
  _galState[key] = Math.max(0, cur - 1);
  saveData(); renderAll();
}

// CONTENTEDITABLE ATTACH (hero inline editing)
// ═══════════════════════════════════════════════════════════
function attachCE(root) {
  root.querySelectorAll('[data-path]').forEach(el=>{
    el.addEventListener('input', ()=>{
      setPath(data, el.getAttribute('data-path'), el.textContent.trim());
      saveData();
    });
  });
}
function setPath(obj, path, val) {
  const parts = path.split('.');
  let cur = obj;
  for (let i=0;i<parts.length-1;i++) {
    const k = isNaN(parts[i]) ? parts[i] : +parts[i];
    cur = cur[k];
  }
  const last = parts[parts.length-1];
  cur[isNaN(last)?last:+last] = val;
}

// ═══════════════════════════════════════════════════════════
// EXPERIENCE CRUD
// ═══════════════════════════════════════════════════════════
function editExp(id) {
  const x = data.experience.find(e=>e.id===id); if(!x) return;
  const blist = x.points.map((pt,i)=>`
    <div class="bullet-item" id="bi${i}">
      <input type="text" class="bpt" data-bi="${i}" value="${h(pt)}" />
      <button class="bullet-remove" onclick="removeBullet(${i})">×</button>
    </div>`).join('');
  showModal('Edit Experience',`
    <div class="form-group"><label>Period</label><input type="text" id="xp" value="${h(x.period)}" placeholder="Jan 2020 — Dec 2022"/></div>
    <div class="form-group"><label>Role / Position</label><input type="text" id="xr" value="${h(x.role)}" /></div>
    <div class="form-group"><label>Company</label><input type="text" id="xc" value="${h(x.company)}" /></div>
    <div class="form-group">
      <label>Key Points</label>
      <ul class="bullet-list" id="blist">${blist}</ul>
      <button class="add-bullet-btn" onclick="addBullet()">＋ Add Point</button>
    </div>
    <div class="form-actions">
      <button class="admin-btn" onclick="closeModal()">Cancel</button>
      <button class="admin-btn gold" onclick="saveExp('${id}')">Save</button>
    </div>`);
}
function addBullet() {
  const list=document.getElementById('blist');
  const i=list.children.length;
  const d=document.createElement('div');
  d.className='bullet-item'; d.id=`bi${i}`;
  d.innerHTML=`<input type="text" class="bpt" data-bi="${i}" value="" /><button class="bullet-remove" onclick="removeBullet(${i})">×</button>`;
  list.appendChild(d);
}
function removeBullet(i) { const el=document.getElementById(`bi${i}`); if(el) el.remove(); }
function saveExp(id) {
  const x=data.experience.find(e=>e.id===id); if(!x) return;
  x.period=document.getElementById('xp').value.trim();
  x.role=document.getElementById('xr').value.trim();
  x.company=document.getElementById('xc').value.trim();
  x.points=Array.from(document.querySelectorAll('.bpt')).map(e=>e.value.trim()).filter(v=>v);
  saveData(); closeModal(); renderAll();
}

// ═══════════════════════════════════════════════════════════
// SCROLL REVEAL + NAV HIGHLIGHT
// ═══════════════════════════════════════════════════════════
function initScrollReveal() {
  const items=document.querySelectorAll('.reveal');
  const obs=new IntersectionObserver(entries=>{
    entries.forEach(e=>{ if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);} });
  },{threshold:0.08});
  items.forEach(r=>obs.observe(r));
}
function initNavHighlight() {
  window.addEventListener('scroll',()=>{
    let cur='';
    document.querySelectorAll('section[id],[id]').forEach(s=>{ if(window.scrollY>=s.offsetTop-220) cur=s.id; });
    document.querySelectorAll('.nav-links a').forEach(a=>{ a.style.color=a.getAttribute('href')==='#'+cur?'var(--gold)':''; });
  },{passive:true});
}

// ═══════════════════════════════════════════════════════════
// KEYBOARD & EVENT HANDLERS
// ═══════════════════════════════════════════════════════════
document.addEventListener('keydown', e=>{
  // Ctrl+Alt+A  →  toggle admin
  if (e.ctrlKey && e.altKey && e.key.toLowerCase()==='a') { e.preventDefault(); isAdmin ? exitAdmin() : showLogin(); }
  // Enter in login modal
  if (e.key==='Enter' && document.getElementById('loginModal').classList.contains('active')) doLogin();
  // Escape closes modals
  if (e.key==='Escape') {
    closeModal();
    if (document.getElementById('loginModal').classList.contains('active')) hideLogin();
    if (document.getElementById('demoModal').classList.contains('active')) closeDemo();
  }
});
// Close on overlay click
document.getElementById('loginModal').addEventListener('click',e=>{ if(e.target===document.getElementById('loginModal')) hideLogin(); });
document.getElementById('editModal').addEventListener('click', e=>{ if(e.target===document.getElementById('editModal')) closeModal(); });
