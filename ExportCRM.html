/* ---------- storage: works inside Claude.ai (window.storage) and standalone (localStorage) ---------- */
const storage = {
  async get(key) {
    if (window.storage && typeof window.storage.get === "function") {
      try { const r = await window.storage.get(key, false); return r ? JSON.parse(r.value) : null; }
      catch (e) { return null; }
    }
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch (e) { return null; }
  },
  async set(key, value) {
    if (window.storage && typeof window.storage.set === "function") {
      try { await window.storage.set(key, JSON.stringify(value), false); return; }
      catch (e) { /* fall through to localStorage as backup */ }
    }
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error(e); }
  }
};

  console.error("Firebase init failed:", e);

const FB_ROOT = "export_crm";

// Live connection indicator — Firebase's special ".info/connected" path pushes
// true/false the moment socket status changes, so the dot in the header stays accurate.
if (fbReady) {
  fbDb.ref(".info/connected").on("value", (snap) => {
    state.cloudStatus = snap.val() === true ? "online" : "offline";
    render();
  });
} else {
  state.cloudStatus = "offline";
}

// Fire-and-forget write to cloud; never blocks the UI, errors are just logged.
async function fbSave(key, value, ts) {
  if (!fbReady || !fbDb) return;
  try {
    await fbDb.ref(`${FB_ROOT}/${key}`).set({ data: value, updatedAt: ts || Date.now() });
  } catch (e) {
    console.error("Firebase save error [" + key + "]:", e);
  }
}

// Runs in the background after local (fast) load. Only overwrites local/state
// if the cloud copy is strictly newer, so a stale cloud read never clobbers
// fresh local edits (same pattern used across the other factory tools).
async function fbAutoLoad(key, arrName) {
  if (!fbReady || !fbDb) return;
  try {
    const snap = await fbDb.ref(`${FB_ROOT}/${key}`).once("value");
    if (!snap.exists()) return;
    const cloud = snap.val();
    if (!cloud || !Array.isArray(cloud.data)) return;
    const localTs = Number((await storage.get(key + "-ts")) || 0);
    if (cloud.updatedAt && cloud.updatedAt > localTs) {
      state[arrName] = cloud.data;
      await storage.set(key, state[arrName]);
      await storage.set(key + "-ts", cloud.updatedAt);
      render();
    }
  } catch (e) {
    console.error("Firebase load error [" + key + "]:", e);
  }
}

function websiteLink(url, companyName) {
  const raw = String(url ?? "").trim();
  const looksLikeDomain = /^(https?:\/\/)?([\w-]+\.)+[a-z]{2,}([\/?#].*)?$/i.test(raw) && !/\s/.test(raw);
  if (raw && looksLikeDomain) {
    const href = /^https?:\/\//i.test(raw) ? raw : `https://${raw}`;
    return `<a href="${esc(href)}" target="_blank" rel="noopener noreferrer" class="site-link" onclick="event.stopPropagation()">🔗 ${esc(raw)}</a>`;
  }
  // Website missing or not a valid-looking domain — fall back to a Google search so it's still clickable
  const q = encodeURIComponent(companyName || raw || "");
  if (!q) return "";
  return `<a href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener noreferrer" class="site-link" onclick="event.stopPropagation()">🔎 Google par dhundhein${raw ? ` (${esc(raw)} — link valid nahi laga)` : ""}</a>`;
}

/* ---------- AI helpers (only work when run inside a Claude.ai artifact) ---------- */
async function callClaude(prompt, maxTokens = 900) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, messages: [{ role: "user", content: prompt }] })
  });
  const data = await res.json();
  const text = (data.content || []).filter(b => b.type === "text").map(b => b.text).join("\n");
  return text || "Response nahi mil paaya.";
}
async function callClaudeWithSearch(prompt, maxTokens = 1200) {
  const res = await fetch("https://api.anthropic.com/v1/messages", {
    method: "POST", headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ model: "claude-sonnet-4-6", max_tokens: maxTokens, messages: [{ role: "user", content: prompt }], tools: [{ type: "web_search_20250305", name: "web_search" }] })
  });
  const data = await res.json();
  if (data?.error) throw new Error(data.error.message || "API error");
  const blocks = (data.content || []).filter(b => b.type === "text").map(b => b.text);
  return blocks.length ? blocks[blocks.length - 1] : "";
}
const sleep = (ms) => new Promise(r => setTimeout(r, ms));

/* ---------- app state ---------- */
let state = {
  loaded: false, tab: "dashboard",
  buyers: [], contacts: [], products: [], tasks: [],
  editBuyer: null, editContact: null, editProduct: null, editTask: null,
  emailForm: { buyerId: "", type: "Introduction", context: "" }, emailResult: "", emailLoading: false,
  insightResult: "", insightLoading: false,
  searchCountry: "", searchCategory: "",
  importStatus: "",
  lookupName: "", lookupLoading: false, lookupResult: null, lookupError: "",
  discoverResults: null, discoverLoading: false, discoverError: "", discoverProgress: "",
  buyerDupWarning: "", buyerDupConfirmed: false,
  quickFindOpen: false, quickFindQuery: "",
  settingsOpen: false, restorePending: null, restoreStatus: "", backupStatus: "",
  pin: null, unlocked: false, pinEntry: "", pinError: "", pinSetupValue: "", pinSetupStatus: "",
  cloudStatus: "connecting", cloudSaveStatus: "", cloudUploadStatus: "", cloudUploadPending: false,
};

async function loadAll() {
  state.buyers = (await storage.get("buyers-list")) || [];
  state.contacts = (await storage.get("contacts-list")) || [];
  state.products = (await storage.get("products-list")) || [];
  state.tasks = (await storage.get("tasks-list")) || [];
  state.pin = await storage.get("app-pin");
  state.unlocked = !state.pin;
  state.loaded = true;
  render();

  // Cloud check happens after the instant local render — if Firebase has a
  // newer copy (e.g. edited on another device), it replaces local silently.
  fbAutoLoad("buyers-list", "buyers");
  fbAutoLoad("contacts-list", "contacts");
  fbAutoLoad("products-list", "products");
  fbAutoLoad("tasks-list", "tasks");
}
async function persist(key, arrName) {
  const ts = Date.now();
  await storage.set(key, state[arrName]);
  await storage.set(key + "-ts", ts);
  fbSave(key, state[arrName], ts); // don't await — keep UI snappy
}

function buyerName(id) { const b = state.buyers.find(x => x.id === id); return b ? esc(b.name) + " (" + esc(b.company) + ")" : "—"; }

/* ---------- cloud status indicator + manual save/upload ---------- */
function cloudIndicator() {
  const map = {
    online:     { dot: "🟢", label: "Cloud Sync ON" },
    offline:    { dot: "🔴", label: "Offline" },
    connecting: { dot: "🟡", label: "Connecting…" },
  };
  const s = map[state.cloudStatus] || map.connecting;
  return `<span title="${esc(s.label)}" style="font-size:11px;color:var(--muted);display:flex;align-items:center;gap:4px;white-space:nowrap;">
    <span style="font-size:9px;">${s.dot}</span>${esc(s.label)}
  </span>`;
}

const CLOUD_KEYS = [["buyers-list","buyers"],["contacts-list","contacts"],["products-list","products"],["tasks-list","tasks"]];

// Manual "Save" — force-pushes current local data to Firebase right now,
// regardless of auto-sync, and reports success/failure back to the user.
async function cloudPushAll() {
  if (!fbReady) { state.cloudSaveStatus = "Firebase connect nahi hai — internet check karein."; render(); return; }
  state.cloudSaveStatus = "Cloud par save ho raha hai..."; render();
  try {
    const ts = Date.now();
    for (const [key, arrName] of CLOUD_KEYS) {
      await storage.set(key + "-ts", ts);
      await fbDb.ref(`${FB_ROOT}/${key}`).set({ data: state[arrName], updatedAt: ts });
    }
    state.cloudSaveStatus = "Cloud par save ho gaya ✓";
  } catch (e) {
    console.error("Cloud save error:", e);
    state.cloudSaveStatus = "Save mein error aayi — Firebase rules ya connection check karein.";
  }
  render();
  setTimeout(() => { state.cloudSaveStatus = ""; render(); }, 4000);
}

// Manual "Upload" (pull) — fetches latest cloud copy and shows a confirm step
// before overwriting local data, same safety pattern as JSON restore.
async function cloudPullAll() {
  if (!fbReady) { state.cloudUploadStatus = "Firebase connect nahi hai — internet check karein."; render(); return; }
  state.cloudUploadStatus = "Cloud se data laaya ja raha hai..."; render();
  try {
    const result = {};
    for (const [key, arrName] of CLOUD_KEYS) {
      const snap = await fbDb.ref(`${FB_ROOT}/${key}`).once("value");
      result[arrName] = snap.exists() && Array.isArray(snap.val().data) ? snap.val().data : [];
    }
    state.cloudUploadPending = result;
    state.cloudUploadStatus = "";
  } catch (e) {
    console.error("Cloud pull error:", e);
    state.cloudUploadStatus = "Load mein error aayi — Firebase rules ya connection check karein.";
  }
  render();
}
async function confirmCloudPull() {
  const d = state.cloudUploadPending;
  if (!d) return;
  const ts = Date.now();
  for (const [key, arrName] of CLOUD_KEYS) {
    state[arrName] = d[arrName] || [];
    await storage.set(key, state[arrName]);
    await storage.set(key + "-ts", ts);
  }
  state.cloudUploadPending = null;
  state.cloudUploadStatus = "Cloud se data upload ho gaya ✓";
  render();
  setTimeout(() => { state.cloudUploadStatus = ""; render(); }, 4000);
}

/* ---------- render ---------- */
function render() {
  const app = document.getElementById("app");
  const active = document.activeElement;
  const activeId = active && active.id ? active.id : null;
  const selStart = active && typeof active.selectionStart === "number" ? active.selectionStart : null;
  const selEnd = active && typeof active.selectionEnd === "number" ? active.selectionEnd : null;

  if (!state.loaded) { app.innerHTML = '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;color:#B8912F;">Loading…</div>'; return; }

  if (state.pin && !state.unlocked) {
    app.innerHTML = renderLockScreen();
    attachLockHandlers();
    const el = activeId && document.getElementById(activeId);
    if (el) el.focus();
    return;
  }

  app.innerHTML = `
    <header>
      <span class="ship">⛴</span>
      <div style="flex:1;"><h1>Export Manifest CRM</h1><p>Home Furnishing Buyer Ledger — Panipat</p></div>
      ${cloudIndicator()}
      <button class="close-x" data-action="open-quickfind" title="Quick Find" style="font-size:20px;">🔎</button>
      <button class="close-x" data-action="open-settings" title="Settings" style="font-size:20px;">⚙️</button>
    </header>
    <main>${renderTab()}</main>
    <nav>
      ${navBtn("dashboard","📊","Dashboard")}${navBtn("buyers","👥","Buyers")}${navBtn("crm","💬","CRM")}
      ${navBtn("email","✉️","Email AI")}${navBtn("products","📦","Products")}${navBtn("search","🔍","Search")}
      ${navBtn("tasks","🔔","Tasks")}${navBtn("insights","✨","Insights")}
    </nav>
    ${renderModals()}
  `;
  attachHandlers();

  if (activeId) {
    const el = document.getElementById(activeId);
    if (el) {
      el.focus();
      if (selStart !== null && typeof el.setSelectionRange === "function") {
        try { el.setSelectionRange(selStart, selEnd); } catch (e) { /* not a text-selectable input */ }
      }
    }
  }
}

function renderLockScreen() {
  return `
    <div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;">
      <div class="card" style="max-width:320px;width:100%;text-align:center;">
        <div style="font-size:32px;margin-bottom:8px;">🔒</div>
        <h2 style="margin-bottom:14px;">Export Manifest CRM</h2>
        <label>PIN Daalein</label>
        <input id="pinEntryInput" type="password" inputmode="numeric" value="${esc(state.pinEntry)}" placeholder="••••" style="text-align:center;letter-spacing:4px;font-size:18px;" />
        ${state.pinError ? `<p class="error-msg">${esc(state.pinError)}</p>` : ""}
        <button class="btn" style="width:100%;" data-action="unlock-app">Unlock</button>
      </div>
    </div>`;
}
function attachLockHandlers() {
  const inp = document.getElementById("pinEntryInput");
  if (inp) inp.addEventListener("input", () => { state.pinEntry = inp.value; state.pinError = ""; });
  bind("unlock-app", () => {
    if (state.pinEntry === state.pin) { state.unlocked = true; state.pinEntry = ""; state.pinError = ""; render(); }
    else { state.pinError = "Galat PIN, dobara try karein."; render(); }
  });
}
function navBtn(id, icon, label) {
  return `<button data-tab="${id}" class="${state.tab===id?"active":""}"><span class="ic">${icon}</span>${label}</button>`;
}

function renderTab() {
  switch (state.tab) {
    case "dashboard": return dashboardTab();
    case "buyers": return buyersTab();
    case "crm": return crmTab();
    case "email": return emailTab();
    case "products": return productsTab();
    case "search": return searchTab();
    case "tasks": return tasksTab();
    case "insights": return insightsTab();
    default: return "";
  }
}

function dashboardTab() {
  const totalContacted = new Set(state.contacts.map(c => c.buyerId)).size;
  const totalReplied = new Set(state.contacts.filter(c => c.replyReceived === "Yes").map(c => c.buyerId)).size;
  const totalSamples = state.contacts.filter(c => c.sampleSent === "Yes").length;
  const totalOrders = state.contacts.filter(c => c.orderStatus === "Order Received").length;
  const conv = totalContacted ? Math.round((totalOrders / totalContacted) * 100) : 0;
  const upcoming = state.tasks.filter(t => !t.done).sort((a,b)=>a.dueDate.localeCompare(b.dueDate)).slice(0,5);

  const countryCounts = {};
  state.buyers.forEach(b => { const c = b.country.trim() || "Unknown"; countryCounts[c] = (countryCounts[c]||0)+1; });
  const topCountries = Object.entries(countryCounts).sort((a,b)=>b[1]-a[1]).slice(0,5).map(([label,value])=>({label,value}));

  const priorityCounts = { A: 0, B: 0, C: 0 };
  state.buyers.forEach(b => { if (priorityCounts[b.priority] !== undefined) priorityCounts[b.priority]++; });
  const priorityItems = [
    { label: "Priority A", value: priorityCounts.A, color: "var(--thread)" },
    { label: "Priority B", value: priorityCounts.B, color: "var(--brass)" },
    { label: "Priority C", value: priorityCounts.C, color: "var(--border)" },
  ];

  const now = new Date();
  const months = [];
  for (let i = 5; i >= 0; i--) { const d = new Date(now.getFullYear(), now.getMonth()-i, 1); months.push(d.toISOString().slice(0,7)); }
  const monthLabel = (ym) => { const [y,m] = ym.split("-"); return new Date(+y, +m-1, 1).toLocaleString("en", { month: "short", year: "2-digit" }); };
  const monthlyItems = [];
  months.forEach(ym => {
    const contactedCount = state.contacts.filter(c => (c.emailDate||"").slice(0,7) === ym).length;
    const orderCount = state.contacts.filter(c => (c.emailDate||"").slice(0,7) === ym && c.orderStatus === "Order Received").length;
    monthlyItems.push({ label: monthLabel(ym) + " · Contacted", value: contactedCount, color: "var(--brass)" });
    monthlyItems.push({ label: monthLabel(ym) + " · Orders", value: orderCount, color: "var(--thread)" });
  });

  return `
    <div class="stamps">
      ${stamp(totalContacted,"Contacted")}${stamp(totalReplied,"Replied")}${stamp(totalSamples,"Samples Sent")}${stamp(totalOrders,"Orders")}${stamp(conv+"%","Conversion")}
    </div>
    <div class="card">
      <h3 class="section-title" style="color:var(--brass);">Upcoming Follow-ups</h3>
      ${upcoming.length===0 ? '<p class="muted">Koi pending task nahi hai.</p>' :
        upcoming.map(t=>`<div class="row" style="border-bottom:1px solid var(--border);padding-bottom:8px;margin-bottom:8px;">
          <span class="ink">${esc(t.type)} — ${buyerName(t.buyerId)} <span class="muted">(${t.dueDate})</span></span>
          <button class="btn btn-small" data-action="task-done" data-id="${t.id}">Done</button>
        </div>`).join("")}
    </div>
    <button class="btn" style="width:100%;margin-bottom:14px;" data-tab="insights">✨ AI Insights Dekhein</button>

    ${state.buyers.length>0 ? barChart("Buyers by Country (Top 5)", topCountries) : ""}
    ${state.buyers.length>0 ? barChart("Priority Breakdown", priorityItems) : ""}
    ${state.contacts.length>0 ? barChart("Monthly Activity (Last 6 Months)", monthlyItems) : ""}
  `;
}
function barChart(title, items) {
  const max = Math.max(1, ...items.map(i=>i.value));
  return `<div class="card">
    <h3 class="section-title" style="color:var(--brass);">${esc(title)}</h3>
    ${items.map(i=>`
      <div style="margin-bottom:10px;">
        <div class="row" style="margin-bottom:3px;"><span class="ink">${esc(i.label)}</span><span class="muted">${i.value}</span></div>
        <div style="background:var(--border);border-radius:4px;height:8px;overflow:hidden;">
          <div style="width:${Math.round(i.value/max*100)}%;height:100%;background:${i.color||"var(--brass)"};"></div>
        </div>
      </div>`).join("")}
  </div>`;
}
function stamp(v,l){ return `<div class="stamp"><div class="v">${v}</div><div class="l">${l}</div></div>`; }

function parseEmailResult(text) {
  const lines = text.split("\n");
  let subject = ""; let bodyStart = 0;
  for (let i=0;i<lines.length;i++){
    const m = lines[i].match(/^\s*Subject:\s*(.*)$/i);
    if (m) { subject = m[1].trim(); bodyStart = i+1; break; }
  }
  const body = lines.slice(bodyStart).join("\n").trim();
  return { subject: subject || "Regarding our home furnishing products", body: body || text };
}

  if (state.editTask) {

  }
  if (state.quickFindOpen) {

    if (q) {
      state.buyers.forEach(b => { if ((b.name+" "+b.company+" "+b.email+" "+b.country).toLowerCase().includes(q)) results.push({ type:"Buyer", label:`${b.name} — ${b.company}`, tab:"buyers" }); });
      state.products.forEach(p => { if (p.name.toLowerCase().includes(q)) results.push({ type:"Product", label:p.name, tab:"products" }); });
      state.tasks.forEach(t => { if ((t.type+" "+t.note).toLowerCase().includes(q)) results.push({ type:"Task", label:`${t.type} — ${buyerName(t.buyerId)}`, tab:"tasks" }); });
      state.contacts.forEach(c => { if ((c.meetingNotes+" "+c.replyNotes).toLowerCase().includes(q)) results.push({ type:"Contact", label:buyerName(c.buyerId), tab:"crm" }); });
    }
    out += `<div class="modal-bg" data-action="close-quickfind">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>🔎 Quick Find</h3><button class="close-x" data-action="close-quickfind">✕</button></div>
        <div class="modal-body">
          <input id="quickFindInput" value="${esc(state.quickFindQuery)}" placeholder="Naam, company, product, task se search karein..." autofocus />

          ${results.slice(0,20).map(r=>`
            <div class="card" data-action="quickfind-goto" data-tab="${r.tab}" style="cursor:pointer;">

        </div>
      </div></div>`;
  }

  if (state.settingsOpen) {
    out += `<div class="modal-bg" data-action="close-settings">
      <div class="modal" data-stop="1">
        <div class="modal-head"><h3>⚙️ Settings</h3><button class="close-x" data-action="close-settings">✕</button></div>
        <div class="modal-body">
          <h3 class="section-title" style="color:var(--brass);">☁ Cloud Sync</h3>

          <button class="btn" style="width:100%;margin-bottom:8px;" data-action="cloud-save">☁ Save (Cloud Par Bhejein)</button>
          ${state.cloudSaveStatus ? `<p class="status-msg">${esc(state.cloudSaveStatus)}</p>` : ""}
          <button class="btn-outline" style="width:100%;" data-action="cloud-upload">⬆ Upload (Cloud Se Layein)</button>
          ${state.cloudUploadStatus ? `<p class="${state.cloudUploadStatus.includes('✓') ? 'status-msg' : 'error-msg'}">${esc(state.cloudUploadStatus)}</p>` : ""}
          ${state.cloudUploadPending ? `
            <div class="card" style="margin-top:10px;">
              <p class="ink">Cloud mein ${state.cloudUploadPending.buyers.length} buyers, ${state.cloudUploadPending.contacts.length} contacts, ${state.cloudUploadPending.products.length} products, ${state.cloudUploadPending.tasks.length} tasks mile.</p>
              <p class="error-msg">Upload karne se current local data cloud wale se replace ho jayega. Confirm karein?</p>
              <div class="flex-gap">
                <button class="btn flex-1" data-action="confirm-cloud-upload">Confirm Upload</button>
                <button class="btn-outline flex-1" data-action="cancel-cloud-upload">Cancel</button>
              </div>
            </div>` : ""}

          <div class="divider"></div>
          <h3 class="section-title" style="color:var(--brass);">Backup & Restore</h3>
          <p class="muted" style="margin-bottom:8px;">Pura data (buyers, contacts, products, tasks) ek JSON file mein save karein — device kho jaaye ya browser data clear ho to yeh file se sab wapas aa jayega.</p>
          <button class="btn" style="width:100%;margin-bottom:8px;" data-action="download-backup">⬇ Backup Download Karein</button>
          ${state.backupStatus ? `<p class="status-msg">${esc(state.backupStatus)}</p>` : ""}
          <input type="file" id="restoreInput" accept=".json" class="hidden" />
          <button class="btn-outline" style="width:100%;" data-action="restore-trigger">⬆ Backup File se Restore Karein</button>
          ${state.restoreStatus ? `<p class="status-msg">${esc(state.restoreStatus)}</p>` : ""}
          ${state.restorePending ? `
            <div class="card" style="margin-top:10px;">
              <p class="ink">File mein ${state.restorePending.buyers.length} buyers, ${state.restorePending.contacts.length} contacts, ${state.restorePending.products.length} products, ${state.restorePending.tasks.length} tasks hain.</p>
              <p class="error-msg">Restore karne se current data replace ho jayega. Confirm karein?</p>
              <div class="flex-gap">
                <button class="btn flex-1" data-action="confirm-restore">Confirm Restore</button>
                <button class="btn-outline flex-1" data-action="cancel-restore">Cancel</button>
              </div>
            </div>` : ""}

          <div class="divider">
            <h3 class="section-title" style="color:var(--brass);">PIN Lock</h3>
            <p class="muted" style="margin-bottom:8px;">${state.pin ? "PIN abhi set hai — app kholte waqt PIN maanga jayega." : "Koi PIN set nahi hai."}</p>
            <label>${state.pin ? "Naya PIN (badalne ke liye)" : "Naya PIN Set Karein (4-6 digit)"}</label>

            ${state.pinSetupStatus ? `<p class="status-msg">${esc(state.pinSetupStatus)}</p>` : ""}
            <div class="flex-gap">
              <button class="btn flex-1" data-action="save-pin">${state.pin?"PIN Update Karein":"PIN Set Karein"}</button>
              ${state.pin ? `<button class="btn-outline flex-1" data-action="remove-pin">PIN Hataayein</button>` : ""}
            </div>
          </div>

          <button class="btn-outline" style="width:100%;margin-top:18px;" data-action="close-settings">⬅ Back</button>
        </div>
      </div></div>`;
  }

  return out;
}

/* ---------- excel import ---------- */
async function parseExcelFile(file) {
  const buf = await file.arrayBuffer();
  const wb = XLSX.read(buf, { type: "array" });
  const sheet = wb.Sheets[wb.SheetNames[0]];
  const rows = XLSX.utils.sheet_to_json(sheet, { defval: "" });
  const norm = (s) => String(s).toLowerCase().replace(/[^a-z0-9]/g, "");
  const pick = (row, ...keys) => {
    const rowKeys = Object.keys(row);
    for (const k of keys) { const m = rowKeys.find(rk => norm(rk) === norm(k)); if (m) return String(row[m] ?? "").trim(); }
    return "";
  };
  return rows.map(row => ({
    id: uid(),
    name: pick(row,"buyername","name","buyer"), company: pick(row,"company","companyname"),
    country: pick(row,"country"), website: pick(row,"website","site"), email: pick(row,"email"),
    phone: pick(row,"phone","mobile","contact"), linkedin: pick(row,"linkedin"),
    category: pick(row,"productcategory","category"), moq: pick(row,"moq"),
    annualImport: pick(row,"annualimportdata","annualimport","importvolume"),
    priority: (pick(row,"priority")||"B").toUpperCase().charAt(0) || "B",
  })).filter(b => b.name || b.company);
}

/* ---------- event delegation ---------- */
function attachHandlers() {
  const app = document.getElementById("app");

  app.querySelectorAll("[data-tab]").forEach(el => el.addEventListener("click", () => { state.tab = el.dataset.tab; render(); }));

  app.querySelectorAll("[data-action]").forEach(el => {
    const act = el.dataset.action;
    if (act === "close-modal") {
      el.addEventListener("click", (e) => {
        if (e.target !== el) return; // only close on background click, not modal content
        const which = el.dataset.which;
        if (which==="buyer") { state.editBuyer=null; state.buyerDupWarning=""; state.buyerDupConfirmed=false; }
        if (which==="contact") state.editContact=null;
        if (which==="product") state.editProduct=null; if (which==="task") state.editTask=null;
        render();
      });
    }
  });
  app.querySelectorAll(".modal").forEach(el => el.addEventListener("click", e => e.stopPropagation()));

  bind("add-buyer", () => { state.editBuyer = emptyBuyer(); state.buyerDupWarning = ""; state.buyerDupConfirmed = false; render(); });
  bind("edit-buyer", (el) => { state.editBuyer = state.buyers.find(b=>b.id===el.dataset.id); state.buyerDupWarning = ""; state.buyerDupConfirmed = false; render(); });
  bind("delete-buyer", (el) => {
    state.buyers = state.buyers.filter(b=>b.id!==el.dataset.id);
    state.contacts = state.contacts.filter(c=>c.buyerId!==el.dataset.id);
    persist("buyers-list","buyers"); persist("contacts-list","contacts"); render();
  });
  bind("save-buyer", () => {
    const b = state.editBuyer;
    b.name=val("f_name"); b.company=val("f_company"); b.country=val("f_country"); b.website=val("f_website");
    b.email=val("f_email"); b.phone=val("f_phone"); b.linkedin=val("f_linkedin"); b.category=val("f_category");
    b.moq=val("f_moq"); b.annualImport=val("f_annualImport"); b.priority=val("f_priority");
    const exists = state.buyers.some(x=>x.id===b.id);
    if (!exists && !state.buyerDupConfirmed) {
      const dup = state.buyers.find(x =>
        (b.email.trim() && x.email.trim().toLowerCase() === b.email.trim().toLowerCase()) ||
        (b.company.trim() && x.company.trim().toLowerCase() === b.company.trim().toLowerCase()));
      if (dup) {
        state.buyerDupWarning = `Yeh company/email already database mein hai: "${dup.name} (${dup.company})". Phir bhi add karna hai to button dobara dabayein.`;
        state.buyerDupConfirmed = true;
        render();
        return;
      }
    }
    state.buyerDupWarning = ""; state.buyerDupConfirmed = false;
    state.buyers = exists ? state.buyers.map(x=>x.id===b.id?b:x) : [...state.buyers, b];
    state.editBuyer = null; persist("buyers-list","buyers"); render();
  });

  bind("add-contact", () => { state.editContact = emptyContact(); render(); });
  bind("edit-contact", (el) => { state.editContact = state.contacts.find(c=>c.id===el.dataset.id); render(); });
  bind("save-contact", () => {
    const c = state.editContact;
    c.buyerId=val("c_buyerId"); c.emailDate=val("c_emailDate"); c.replyReceived=val("c_replyReceived");
    c.nextFollowup=val("c_nextFollowup"); c.sampleSent=val("c_sampleSent"); c.quotationSent=val("c_quotationSent");
    c.orderStatus=val("c_orderStatus"); c.replyNotes=val("c_replyNotes"); c.meetingNotes=val("c_meetingNotes");
    if (!c.buyerId) return;
    const exists = state.contacts.some(x=>x.id===c.id);
    state.contacts = exists ? state.contacts.map(x=>x.id===c.id?c:x) : [...state.contacts, c];
    state.editContact = null; persist("contacts-list","contacts"); render();
  });

  bind("add-product", () => { state.editProduct = emptyProduct(); render(); });
  bind("edit-product", (el) => { state.editProduct = state.products.find(p=>p.id===el.dataset.id); render(); });
  bind("save-product", () => {
    const p = state.editProduct;
    p.name=val("p_name"); p.price=val("p_price"); p.currency=val("p_currency"); p.incoterms=val("p_incoterms");
    p.moq=val("p_moq"); p.catalog=val("p_catalog");
    p.certificates=val("p_certificates"); p.photoDesc=val("p_photoDesc"); p.specs=val("p_specs");
    const exists = state.products.some(x=>x.id===p.id);
    state.products = exists ? state.products.map(x=>x.id===p.id?p:x) : [...state.products, p];

  bind("add-task", () => { state.editTask = emptyTask(); render(); });
  bind("save-task", () => {
    const t = state.editTask;
    t.type=val("t_type"); t.buyerId=val("t_buyerId"); t.dueDate=val("t_dueDate"); t.note=val("t_note");
    const exists = state.tasks.some(x=>x.id===t.id);
    state.tasks = exists ? state.tasks.map(x=>x.id===t.id?t:x) : [...state.tasks, t];
    state.editTask = null; persist("tasks-list","tasks"); render();
  });
  bind("toggle-task", (el) => {
    state.tasks = state.tasks.map(t=>t.id===el.dataset.id?{...t,done:!t.done}:t);
    persist("tasks-list","tasks"); render();
  });
  bind("task-done", (el) => {
    state.tasks = state.tasks.map(t=>t.id===el.dataset.id?{...t,done:true}:t);
    persist("tasks-list","tasks"); render();
  });
  bind("delete-task", (el) => {
    state.tasks = state.tasks.filter(t=>t.id!==el.dataset.id);
    persist("tasks-list","tasks"); render();
  });
  bind("fair-reminder", (el) => {
    const f = TRADE_FAIRS[+el.dataset.idx];
    state.tasks = [...state.tasks, { ...emptyTask(), type:"Follow-up", dueDate:f.date, note:`${f.name} — trade fair sourcing/exhibit reminder` }];
    persist("tasks-list","tasks");
    state.tab = "tasks"; render();
  });

  bind("gen-email", async () => {
    state.emailForm.buyerId = val("emailBuyer"); state.emailForm.type = val("emailType"); state.emailForm.context = val("emailContext");
    const b = state.buyers.find(x=>x.id===state.emailForm.buyerId);
    if (!b) return;
    state.emailLoading = true; state.emailResult = ""; render();
    const prompt = `Tum ek home furnishing export company ke liye professional B2B email likh rahe ho (Panipat, India based exporter). Buyer details: Name: ${b.name}, Company: ${b.company}, Country: ${b.country}, Product Category interested: ${b.category}, MOQ: ${b.moq}. Email type: ${state.emailForm.type}. Extra context: ${state.emailForm.context || "none"}. Email professional business English mein likho (buyer international hai), concise, persuasive, with clear subject line at top as "Subject: ...". Sirf email content do, koi extra explanation nahi.`;
    try { state.emailResult = await callClaude(prompt, 700); }
    catch (e) { state.emailResult = "Email generate nahi ho paaya. Yeh feature sirf Claude.ai ke andar chalta hai — agar file download karke standalone khola hai to yeh kaam nahi karega."; }
    state.emailLoading = false; render();
  });

  bind("gen-insights", async () => {
    state.insightLoading = true; state.insightResult = ""; render();
    const dataSummary = {
      buyers: state.buyers.map(b=>({name:b.name,company:b.company,country:b.country,category:b.category,priority:b.priority,annualImport:b.annualImport})),
      contacts: state.contacts.map(c=>({buyerId:c.buyerId,reply:c.replyReceived,sample:c.sampleSent,quotation:c.quotationSent,orderStatus:c.orderStatus})),
    };
    const prompt = `Tum ek home furnishing export business ke liye AI sales analyst ho (India, Panipat based). Neeche diya gaya buyer aur contact data dekho aur Hinglish mein short insights do teen headings ke saath:\n1) Kaun se buyers ki order milne ki sambhavna sabse zyada hai aur kyun\n2) Kis country mein sabse zyada opportunity dikh rahi hai\n3) Kaun sa product category sabse zyada demand mein hai\nData: ${JSON.stringify(dataSummary)}\nAgar data bahut kam hai to woh bhi bata dena. Concise rakhna, bullet points use karo.`;
    try { state.insightResult = await callClaude(prompt, 800); }
    catch (e) { state.insightResult = "Insights generate nahi ho paaye. Yeh feature sirf Claude.ai ke andar chalta hai."; }
    state.insightLoading = false; render();
  });

  bind("run-discover", async () => {
    state.discoverLoading = true; state.discoverResults = null; state.discoverError = ""; state.discoverProgress = ""; render();
    const country = state.searchCountry.trim(); const category = state.searchCategory.trim();
    const criteria = [country ? `country: ${country}` : "", category ? `product category: ${category}` : ""].filter(Boolean).join(", ");
    const TARGET = 50;
    const MAX_BATCHES = 7;
    const collected = [];
    const seen = new Set();
    let lastRawError = "";
    for (let batch = 0; batch < MAX_BATCHES && collected.length < TARGET; batch++) {
      state.discoverProgress = `Batch ${batch + 1}/${MAX_BATCHES} search kar rahe hain… (ab tak ${collected.length} buyers mile)`;
      render();
      const excludeList = collected.map(c => c.company).filter(Boolean).slice(-40).join("; ");
      const prompt = `Web search karke home furnishing / home textile import, wholesale, ya retail business mein active REAL companies dhundo jo in criteria se match karti hain — ${criteria}. Is batch mein kam se kam 10-15 NAYI companies do jo pehle list nahi ki gayi hain${excludeList ? ` (yeh already list mein hain, inhe repeat mat karna: ${excludeList})` : ""}. Har company ke liye pata karo: company ka pura naam, desh, official website (agar mile), product category, aur ek chhoti note. SIRF real, verifiable, publicly known companies do — agar pakka confirm na ho to woh company list mein mat daalo. Research ke baad SIRF neeche diya JSON array format return karo, koi aur text pehle ya baad mein nahi:\n[{"company":"","country":"","website":"","category":"","notes":""}]`;
      let raw = "";
      try {
        raw = await callClaudeWithSearch(prompt, 3800);
      } catch (e) {
        // transient/rate-limit error — thoda ruk kar ek baar aur try karein
        await sleep(1500);
        try { raw = await callClaudeWithSearch(prompt, 3800); }
        catch (e2) { lastRawError = e2.message || String(e2); await sleep(800); continue; }
      }
      try {
        const clean = raw.replace(/```json|```/g, "").trim();
        const m = clean.match(/\[[\s\S]*\]/);
        if (!m) { lastRawError = "JSON format nahi mila is batch mein"; await sleep(800); continue; }
        const parsed = JSON.parse(m[0]);
        for (const r of parsed) {
          const key = (r.company || "").trim().toLowerCase();
          if (!key || seen.has(key)) continue;
          seen.add(key);
          collected.push(r);
        }
      } catch (e) {
        lastRawError = e.message || String(e);
        // ek batch fail ho jaaye to poora search mat rokein, agla batch try karein
        await sleep(800);
        continue;
      }
      await sleep(500); // batches ke beech thoda gap, taaki rapid-fire calls se rate-limit na lage
    }
    if (collected.length === 0) {
      state.discoverError = `Search mein error aayi (yeh feature sirf Claude.ai ke andar chalta hai) — ya country/category thoda specific likhein.${lastRawError ? " [detail: " + lastRawError + "]" : ""}`;
    } else {
      state.discoverResults = collected.map(r => ({ ...r, __id: uid(), added: false }));
      if (collected.length < TARGET) {
        state.discoverError = `${collected.length} buyers mile (target ${TARGET} tha) — is niche/country mein itni hi verifiable companies mil paayi. Category/country thoda broad kar ke dobara try karein to zyada mil sakte hain.`;
      }
    }
    state.discoverProgress = ""; state.discoverLoading = false; render();
  });
  bind("discover-add", (el) => {
    const r = state.discoverResults.find(x => x.__id === el.dataset.id);

    persist("buyers-list","buyers");
    r.added = true; render();
  });
  bind("discover-skip", (el) => {
    state.discoverResults = state.discoverResults.filter(x => x.__id !== el.dataset.id);
    render();
  });

  bind("run-lookup", async () => {
    state.lookupName = val("lookupName");
    if (!state.lookupName.trim()) return;
    state.lookupLoading = true; state.lookupResult = null; state.lookupError = ""; render();
    const prompt = `Web search karke "${state.lookupName}" naam ki company/buyer ke baare mein public jaankari dhundo — yeh home furnishing, home textile, ya import/wholesale business context mein ho sakta hai. Pata karo: company ka pura naam, desh, official website, business/product category, aur ek chhoti si note. Agar reliable public info nahi milti to fields khaali chodo aur note mein likho. Research karne ke baad SIRF neeche diya JSON format return karo, koi aur text nahi:\n{"company":"","country":"","website":"","category":"","notes":""}`;
    try {
      const raw = await callClaudeWithSearch(prompt, 1200);
      const clean = raw.replace(/\`\`\`json|\`\`\`/g, "").trim();
      const m = clean.match(/\{[\s\S]*\}/);
      state.lookupResult = JSON.parse(m ? m[0] : clean);
    } catch (e) {
      state.lookupError = "Lookup mein error aayi (yeh feature sirf Claude.ai ke andar chalta hai) — ya naam thoda specific likhein.";
    }
    state.lookupLoading = false; render();
  });
  bind("add-lookup", () => {
    const r = state.lookupResult;
    state.editBuyer = { ...emptyBuyer(), name: state.lookupName, company: r.company||state.lookupName, country: r.country||"", website: r.website||"", category: r.category||"" };
    state.tab = "buyers"; render();
  });

  bind("open-mail-app", () => {
    const b = state.buyers.find(x => x.id === state.emailForm.buyerId);
    const { subject, body } = parseEmailResult(state.emailResult);
    const to = b && b.email ? b.email : "";
    const url = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
    window.location.href = url;
  });

  bind("open-quickfind", () => { state.quickFindOpen = true; state.quickFindQuery = ""; render(); });
  bind("close-quickfind", () => { state.quickFindOpen = false; render(); });
  bind("quickfind-goto", (el) => { state.tab = el.dataset.tab; state.quickFindOpen = false; render(); });

  bind("open-settings", () => { state.settingsOpen = true; state.restorePending = null; state.restoreStatus = ""; state.backupStatus = ""; state.pinSetupValue = ""; state.pinSetupStatus = ""; state.cloudSaveStatus = ""; state.cloudUploadStatus = ""; state.cloudUploadPending = null; render(); });
  bind("close-settings", () => { state.settingsOpen = false; render(); });

  bind("cloud-save", () => { cloudPushAll(); });
  bind("cloud-upload", () => { cloudPullAll(); });
  bind("confirm-cloud-upload", () => { confirmCloudPull(); });
  bind("cancel-cloud-upload", () => { state.cloudUploadPending = null; render(); });

  bind("download-backup", () => {
    const payload = { buyers: state.buyers, contacts: state.contacts, products: state.products, tasks: state.tasks, exportedAt: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `export-crm-backup-${todayISO()}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    state.backupStatus = "Backup download ho gaya ✓"; render();
    setTimeout(() => { state.backupStatus = ""; render(); }, 4000);
  });

  bind("restore-trigger", () => { document.getElementById("restoreInput").click(); });
  bind("confirm-restore", () => {
    const d = state.restorePending;
    state.buyers = d.buyers || []; state.contacts = d.contacts || []; state.products = d.products || []; state.tasks = d.tasks || [];
    persist("buyers-list","buyers"); persist("contacts-list","contacts"); persist("products-list","products"); persist("tasks-list","tasks");
    state.restorePending = null; state.restoreStatus = "Data restore ho gaya ✓"; render();
  });
  bind("cancel-restore", () => { state.restorePending = null; render(); });

  bind("save-pin", () => {
    const v = val("pinSetupInput").trim();
    if (!/^[0-9]{4,6}$/.test(v)) { state.pinSetupStatus = "PIN 4-6 digit ka number hona chahiye."; render(); return; }
    state.pin = v; storage.set("app-pin", v);
    state.pinSetupStatus = "PIN set ho gaya ✓"; state.pinSetupValue = "";
    render();
  });
  bind("remove-pin", () => {
    state.pin = null; storage.set("app-pin", null);
    state.pinSetupStatus = "PIN hata diya gaya."; render();
  });

  const quickFindInput = document.getElementById("quickFindInput");
  if (quickFindInput) quickFindInput.addEventListener("input", () => { state.quickFindQuery = quickFindInput.value; render(); });
  const pinSetupInput = document.getElementById("pinSetupInput");
  if (pinSetupInput) pinSetupInput.addEventListener("input", () => { state.pinSetupValue = pinSetupInput.value; });
  const restoreInput = document.getElementById("restoreInput");
  if (restoreInput) restoreInput.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      if (!parsed.buyers || !parsed.contacts || !parsed.products || !parsed.tasks) throw new Error("invalid");
      state.restorePending = parsed; state.restoreStatus = "";
    } catch (err) { state.restoreStatus = "Yeh valid backup file nahi hai."; }
    render();
  });

  bind("excel-trigger", () => { document.getElementById("excelInput").click(); });

  // plain input listeners (search filters + file input) need to be bound after render too
  const sc = document.getElementById("searchCountry"); if (sc) sc.addEventListener("input", () => { state.searchCountry = sc.value; renderSearchListOnly(); });
  const scat = document.getElementById("searchCategory"); if (scat) scat.addEventListener("input", () => { state.searchCategory = scat.value; renderSearchListOnly(); });
  const fi = document.getElementById("excelInput");
  if (fi) fi.addEventListener("change", async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    state.importStatus = "Padha ja raha hai...";
    try {
      const parsed = await parseExcelFile(file);
      if (parsed.length === 0) state.importStatus = "Koi valid row nahi mili. Columns check karein.";
      else { state.buyers = [...state.buyers, ...parsed]; persist("buyers-list","buyers"); state.importStatus = parsed.length + " buyers import ho gaye ✓"; }
    } catch (err) { state.importStatus = "File padhne mein error aayi. .xlsx ya .csv try karein."; }
    render();
    setTimeout(() => { state.importStatus = ""; render(); }, 5000);
  });
}
function bind(action, handler) {
  document.querySelectorAll(`[data-action="${action}"]`).forEach(el => el.addEventListener("click", () => handler(el)));
}
function val(id) { const el = document.getElementById(id); return el ? el.value : ""; }
function renderSearchListOnly() { render(); } // simple full re-render keeps logic simple & correct

loadAll();
</script>
</body>
</html>
